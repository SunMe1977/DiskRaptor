name: Build & Test DiskRaptor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always
  QT_VERSION: "6.10.3"
  QT_ARCH: win64_msvc2022_64

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt (aqtinstall)
      shell: pwsh
      run: |
        pip install aqtinstall
        aqt install-qt --outputdir C:\Qt windows desktop $env:QT_VERSION $env:QT_ARCH --modules qtwebengine qtwebchannel
        "Qt6_DIR=C:\Qt\$env:QT_VERSION\$env:QT_ARCH\lib\cmake\Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "CMAKE_PREFIX_PATH=C:\Qt\$env:QT_VERSION\$env:QT_ARCH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Setup MSVC dev prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci --ignore-scripts
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    # ── Build ──────────────────────────────────────────────
    - name: Build Rust scanner DLL
      run: cargo build --release
      working-directory: src-tauri
      env:
        CARGO_BUILD_JOBS: 2

    - name: Build Qt app
      shell: pwsh
      run: |
        Push-Location qt-app
        Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Path build | Out-Null
        Push-Location build

        Write-Host "=== CMake configure ==="
        cmake .. -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          "-DQt6_DIR=$env:Qt6_DIR" `
          "-DCMAKE_PREFIX_PATH=$env:CMAKE_PREFIX_PATH"
        if ($LASTEXITCODE -ne 0) { throw "CMake configure failed" }

        Write-Host "=== CMake build ==="
        cmake --build . --config Release
        if ($LASTEXITCODE -ne 0) { throw "CMake build failed" }

        Pop-Location
        Pop-Location

    - name: Stage dist
      shell: pwsh
      run: |
        $SRC = "qt-app/build"
        if (Test-Path "qt-app/build/Release/DiskRaptor.exe") { $SRC = "qt-app/build/Release" }
        Write-Host "=== Staging from $SRC ==="
        New-Item -ItemType Directory -Force -Path dist | Out-Null
        Copy-Item "$SRC/DiskRaptor.exe" dist/ -ErrorAction SilentlyContinue
        Copy-Item "$SRC/diskraptor_scanner.dll" dist/ -ErrorAction SilentlyContinue
        Copy-Item "$SRC/QtWebEngineProcess.exe" dist/ -ErrorAction SilentlyContinue
        Get-ChildItem "$SRC/*.dll" | Copy-Item -Destination dist -ErrorAction SilentlyContinue
        @("platforms","styles","imageformats","tls","iconengines","networkinformation","position","generic","resources","translations") | ForEach-Object {
          $p = Join-Path $SRC $_
          if (Test-Path $p) { Copy-Item -Recurse -Force $p dist/ }
        }
        Copy-Item -Recurse -Force frontend dist/frontend
        if (Test-Path images) { Copy-Item -Recurse -Force images dist/images }

    - name: Verify dist artifacts
      shell: pwsh
      run: |
        Write-Host "=== dist contents ==="
        Get-ChildItem -Recurse dist\ | Select-Object Mode, Length, Name | Format-Table -AutoSize
        $exe = Test-Path dist\DiskRaptor.exe
        $dll = Test-Path dist\diskraptor_scanner.dll
        $qtw = Test-Path dist\QtWebEngineProcess.exe
        if (-not $exe) { throw "Missing DiskRaptor.exe in dist" }
        if (-not $dll) { Write-Warning "Missing diskraptor_scanner.dll" }
        if (-not $qtw) { Write-Warning "Missing QtWebEngineProcess.exe" }
        Write-Host "DiskRaptor.exe: $exe, scanner DLL: $dll, WebEngine: $qtw"

    # ── Test ───────────────────────────────────────────────
    - name: Run UI test
      run: node test_scan.mjs "%USERPROFILE%"
      shell: cmd
      timeout-minutes: 15
      env:
        DISKraptor_CDP_PORT: 9222

    # ── Package ────────────────────────────────────────────
    - name: Get version
      id: version
      shell: pwsh
      run: |
        $ver = (Select-String -Path qt-app/CMakeLists.txt -Pattern 'project\(DiskRaptor VERSION ([0-9.]+)').Matches[0].Groups[1].Value
        if (-not $ver) { $ver = "0.0.7" }
        "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Package release zip
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path artifacts | Out-Null
        & "C:\Program Files\7-Zip\7z.exe" a -tzip "artifacts/DiskRaptor_v$env:VER.zip" ./dist/* 2>&1
      env:
        VER: ${{ steps.version.outputs.version }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: diskraptor-windows-build
        path: artifacts/
        compression-level: 0

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/DiskRaptor_v*.zip
        fail_on_unmatched_files: true
