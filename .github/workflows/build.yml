name: Build & Test DiskRaptor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always
  QT_VERSION: "6.10.3"
  QT_ARCH: win64_msvc2022_64
  QT_ROOT: C:\Qt\6.10.3\msvc2022_64
  QT_DIR: C:\Qt\6.10.3\msvc2022_64

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt (aqtinstall)
      shell: pwsh
      run: |
        pip install aqtinstall
        aqt install-qt --outputdir C:\Qt windows desktop $env:QT_VERSION $env:QT_ARCH --modules qtwebengine qtwebchannel
        "Qt6_DIR=C:\Qt\$env:QT_VERSION\$env:QT_ARCH\lib\cmake\Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "CMAKE_PREFIX_PATH=C:\Qt\$env:QT_VERSION\$env:QT_ARCH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append



    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Setup MSVC dev prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci --ignore-scripts
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    # ── Build ──────────────────────────────────────────────
    - name: Build Rust scanner DLL
      run: cargo build --release
      working-directory: src-tauri
      env:
        CARGO_BUILD_JOBS: 2

    - name: Pre-build checks
      shell: pwsh
      run: |
        Write-Host "=== Tool checks ==="
        Write-Host "cl.exe: $((Get-Command cl.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source) -join ', ')"
        Write-Host "rc.exe: $((Get-Command rc.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source) -join ', ')"
        Write-Host "cmake: $((Get-Command cmake.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source) -join ', ')"
        Write-Host ""
        Write-Host "=== Qt directories under C:\Qt ==="
        Get-ChildItem "C:\Qt" -Depth 1 -ErrorAction SilentlyContinue | Select-Object FullName, Mode | Format-Table -AutoSize
        Write-Host ""
        Write-Host "=== Rust DLL ==="
        $rustDll = "src-tauri/target/release/diskraptor_scanner.dll"
        Write-Host "$rustDll exists: $(Test-Path $rustDll)"

    - name: Build Qt app
      shell: pwsh
      run: |
        # ── Find Qt installation (aqtinstall directory name is unpredictable) ──
        Write-Host "=== Finding Qt6 installation ==="
        $qtDirs = Get-ChildItem "C:\Qt\6.10.3" -Directory -ErrorAction SilentlyContinue
        if (-not $qtDirs) {
          Write-Host "C:\Qt\6.10.3 directories:"
          Get-ChildItem "C:\Qt" -Depth 1 -ErrorAction SilentlyContinue | Select-Object FullName
          throw "No Qt installation found under C:\Qt\6.10.3"
        }
        $qtRoot = $qtDirs[0].FullName
        $qt6Dir = Join-Path $qtRoot "lib\cmake\Qt6"
        Write-Host "Qt root: $qtRoot"
        Write-Host "Qt6_DIR: $qt6Dir"
        if (-not (Test-Path $qt6Dir)) {
          Write-Host "Contents of $qtRoot :"
          Get-ChildItem $qtRoot -Depth 2 -ErrorAction SilentlyContinue | Select-Object FullName
          throw "Qt6 cmake config not found at $qt6Dir"
        }
        $windeploy = Join-Path $qtRoot "bin\windeployqt.exe"
        Write-Host "windeployqt: $(Test-Path $windeploy)"

        # ── Tool checks ──
        Write-Host ""
        Write-Host "=== Tool checks ==="
        Write-Host "cl.exe: $(Get-Command cl.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue)"
        Write-Host "rc.exe: $(Get-Command rc.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue)"
        Write-Host "ninja: $(Get-Command ninja -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue)"

        # ── Build ──
        Push-Location qt-app
        Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Path build | Out-Null
        Push-Location build

        Write-Host ""
        Write-Host "=== CMake configure ==="
        cmake .. -DCMAKE_BUILD_TYPE=Release "-DQt6_DIR=$qt6Dir" "-DCMAKE_PREFIX_PATH=$qtRoot" 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Host "=== CONFIGURE FAILED ==="
          $errorLog = "CMakeFiles\CMakeError.log"
          if (Test-Path $errorLog) { Get-Content $errorLog }
          throw "CMake configure failed (exit $LASTEXITCODE)"
        }

        Write-Host ""
        Write-Host "=== CMake build ==="
        cmake --build . --config Release 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Host "=== BUILD FAILED ==="
          throw "CMake build failed (exit $LASTEXITCODE)"
        }

        Pop-Location
        Pop-Location

    - name: Stage dist
      shell: cmd
      run: |
        :: VS generator puts output in Release\, Ninja puts it at build root
        if exist qt-app\build\Release\DiskRaptor.exe (
          set SRC=qt-app\build\Release
        ) else (
          set SRC=qt-app\build
        )
        echo === Staging from %SRC% ===
        if not exist dist mkdir dist
        if exist %SRC%\DiskRaptor.exe copy %SRC%\DiskRaptor.exe dist\ >nul
        if exist %SRC%\DiskRaptorLauncher.exe copy %SRC%\DiskRaptorLauncher.exe dist\ >nul
        if exist %SRC%\diskraptor_scanner.dll copy %SRC%\diskraptor_scanner.dll dist\ >nul
        if exist %SRC%\QtWebEngineProcess.exe copy %SRC%\QtWebEngineProcess.exe dist\ >nul
        if exist %SRC%\*.dll copy %SRC%\*.dll dist\ >nul
        if exist %SRC%\platforms xcopy /e /i /y %SRC%\platforms dist\platforms >nul 2>&1
        if exist %SRC%\styles xcopy /e /i /y %SRC%\styles dist\styles >nul 2>&1
        if exist %SRC%\imageformats xcopy /e /i /y %SRC%\imageformats dist\imageformats >nul 2>&1
        if exist %SRC%\tls xcopy /e /i /y %SRC%\tls dist\tls >nul 2>&1
        if exist %SRC%\iconengines xcopy /e /i /y %SRC%\iconengines dist\iconengines >nul 2>&1
        if exist %SRC%\networkinformation xcopy /e /i /y %SRC%\networkinformation dist\networkinformation >nul 2>&1
        if exist %SRC%\position xcopy /e /i /y %SRC%\position dist\position >nul 2>&1
        if exist %SRC%\generic xcopy /e /i /y %SRC%\generic dist\generic >nul 2>&1
        if exist %SRC%\resources xcopy /e /i /y %SRC%\resources dist\resources >nul 2>&1
        if exist %SRC%\translations xcopy /e /i /y %SRC%\translations dist\translations >nul 2>&1
        xcopy /e /i /y frontend dist\frontend\ >nul
        if exist images xcopy /e /i /y images dist\images\ >nul 2>&1
        dir dist\ /b

    - name: Verify dist artifacts
      shell: pwsh
      run: |
        Write-Host "=== dist contents ==="
        Get-ChildItem -Recurse dist\ | Select-Object Mode, Length, Name | Format-Table -AutoSize
        $exe = Test-Path dist\DiskRaptor.exe
        $dll = Test-Path dist\diskraptor_scanner.dll
        $qtw = Test-Path dist\QtWebEngineProcess.exe
        if (-not $exe) { throw "Missing DiskRaptor.exe in dist" }
        if (-not $dll) { Write-Warning "Missing diskraptor_scanner.dll — Rust build may have failed" }
        if (-not $qtw) { Write-Warning "Missing QtWebEngineProcess.exe — windeployqt may not have run" }
        Write-Host "DiskRaptor.exe: $exe, scanner DLL: $dll, WebEngine: $qtw"

    # ── Test ───────────────────────────────────────────────
    - name: Run UI test
      run: node test_scan.mjs "%USERPROFILE%"
      shell: cmd
      timeout-minutes: 10
      env:
        DISKraptor_CDP_PORT: 9222

    # ── Package ────────────────────────────────────────────
    - name: Get version
      id: version
      shell: pwsh
      run: |
        # Read version from CMakeLists.txt
        $ver = (Select-String -Path qt-app/CMakeLists.txt -Pattern 'project\(DiskRaptor VERSION ([0-9.]+)').Matches[0].Groups[1].Value
        if (-not $ver) { $ver = "0.0.1" }
        Write-Host "Version: $ver"
        "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Package release zip
      shell: cmd
      run: |
        if not exist artifacts mkdir artifacts
        cd dist
        "%ProgramFiles%\7-Zip\7z.exe" a -tzip ..\artifacts\DiskRaptor_v%VER%.zip *
      env:
        VER: ${{ steps.version.outputs.version }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: diskraptor-windows-build
        path: artifacts/
        compression-level: 0

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/DiskRaptor_v*.zip
        fail_on_unmatched_files: true
