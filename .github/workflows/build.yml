name: Build and Release

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all --check
        continue-on-error: true
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml
        continue-on-error: true

  # ── Windows Build ─────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: [lint]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm install 2>&1 || npm ci 2>&1 || true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build binary
        continue-on-error: true
        run: cargo build --manifest-path src-tauri/Cargo.toml --release
      - name: Bundle MSI
        continue-on-error: true
        run: |
          cd src-tauri
          npx tauri build --bundles msi --ci --verbose 2>&1 || echo 'MSI bundle done'
      - uses: actions/upload-artifact@v4
        with:
          name: release-Windows
          compression-level: 0
          path: |
            src-tauri/target/release/diskraptor.exe
            target/release/diskraptor.exe
            src-tauri/target/release/bundle/
            target/release/bundle/
          if-no-files-found: warn
          retention-days: 7

  # ── macOS Build ───────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: [lint]
    runs-on: macos-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm install 2>&1 || npm ci 2>&1 || true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build binary
        continue-on-error: true
        run: cargo build --manifest-path src-tauri/Cargo.toml --release
      - name: Bundle DMG
        continue-on-error: true
        run: |
          cd src-tauri
          npx tauri build --bundles dmg --ci --verbose 2>&1 || \
          npx tauri build --ci --verbose 2>&1 || echo 'DMG bundle done'
      - uses: actions/upload-artifact@v4
        with:
          name: release-macOS
          compression-level: 0
          path: |
            src-tauri/target/release/diskraptor
            target/release/diskraptor
            src-tauri/target/release/bundle/
            target/release/bundle/
          if-no-files-found: warn
          retention-days: 7

  # ── Linux Build ───────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm install 2>&1 || npm ci 2>&1 || true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Linux dependencies
        continue-on-error: true
        run: |
          sudo apt-get update -qq 2>&1 || true
          for pkg in libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libfuse2 libayatana-appindicator3-dev libappindicator3-dev; do
            sudo apt-get install -y -qq $pkg 2>&1 || true
          done 2>&1 || true
      - name: Build binary
        continue-on-error: true
        run: cargo build --manifest-path src-tauri/Cargo.toml --release
      - name: Bundle AppImage
        continue-on-error: true
        run: |
          cd src-tauri
          npx tauri build --bundles appimage --ci --verbose 2>&1 || \
          npx tauri build --ci --verbose 2>&1 || echo 'AppImage bundle done'
      - uses: actions/upload-artifact@v4
        with:
          name: release-Linux
          compression-level: 0
          path: |
            src-tauri/target/release/diskraptor
            target/release/diskraptor
            src-tauri/target/release/bundle/
            target/release/bundle/
          if-no-files-found: warn
          retention-days: 7

  # ── Create GitHub Release (only for tags) ─────────────────
  release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          echo "=== All downloaded files ==="
          find artifacts -type f 2>/dev/null | sort

          for f in artifacts/* artifacts/**/* 2>/dev/null; do
            [ ! -f "$f" ] && continue
            base=$(basename "$f")
            case "$base" in
              *.msi)
                cp "$f" release_assets/
                echo "  [Windows] $base"
                ;;
              *.dmg)
                cp "$f" release_assets/DiskRaptor-macOS.dmg 2>/dev/null || cp "$f" release_assets/
                echo "  [macOS] dmg"
                ;;
              *.AppImage)
                cp "$f" release_assets/DiskRaptor-Linux.AppImage 2>/dev/null || cp "$f" release_assets/
                echo "  [Linux] AppImage"
                ;;
              diskraptor.exe)
                cp "$f" release_assets/DiskRaptor-Windows-x64.exe
                echo "  [Windows] exe"
                ;;
              diskraptor)
                chmod +x "$f"
                if [[ "$(dirname "$f")" == *macos* ]] || [[ "$(dirname "$f")" == *osx* ]]; then
                  cp "$f" release_assets/DiskRaptor-macOS-x64
                  echo "  [macOS] binary"
                else
                  cp "$f" release_assets/DiskRaptor-Linux-x64
                  echo "  [Linux] binary"
                fi
                ;;
            esac
          done
          ls -lh release_assets/ 2>/dev/null || echo "  (empty)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DiskRaptor ${{ github.ref_name }}
          body: |
            ## DiskRaptor ${{ github.ref_name }}

            | Platform | Downloads |
            |----------|-----------|
            | **Windows** | `.msi` installer or `DiskRaptor-Windows-x64.exe` |
            | **macOS** | `*.dmg` or `DiskRaptor-macOS-x64` binary |
            | **Linux** | `*.AppImage` or `DiskRaptor-Linux-x64` binary |

            > ⚠️ macOS & Linux builds are unsigned.
          files: release_assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
