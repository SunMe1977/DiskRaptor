name: Build & Test DiskRaptor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.3'
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: qtwebengine qtwebchannel
        cache: true

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup MSVC dev prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci --ignore-scripts
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    - name: Install Playwright Chromium
      run: npx playwright install chromium

    # ── Build ──────────────────────────────────────────────
    - name: Build Rust scanner DLL
      run: cargo build --release
      working-directory: src-tauri

    - name: Build Qt app
      run: |
        echo Qt6_DIR=%Qt6_DIR%
        echo QTDIR=%QTDIR%
        cd qt-app
        if exist build rmdir /s /q build
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="%Qt6_DIR%" -DCMAKE_PREFIX_PATH="%Qt6_DIR%"
        cmake --build . --config Release -- /verbosity:minimal
      shell: cmd

    - name: Stage dist
      run: |
        set SRC=qt-app\build\Release
        mkdir dist
        if exist %SRC%\DiskRaptor.exe copy %SRC%\DiskRaptor.exe dist\ >nul
        if exist %SRC%\diskraptor_scanner.dll copy %SRC%\diskraptor_scanner.dll dist\ >nul
        if exist %SRC%\QtWebEngineProcess.exe copy %SRC%\QtWebEngineProcess.exe dist\ >nul
        if exist %SRC%\*.dll copy %SRC%\*.dll dist\ >nul
        if exist %SRC%\platforms xcopy /e /i /y %SRC%\platforms dist\platforms >nul 2>&1
        if exist %SRC%\styles xcopy /e /i /y %SRC%\styles dist\styles >nul 2>&1
        if exist %SRC%\imageformats xcopy /e /i /y %SRC%\imageformats dist\imageformats >nul 2>&1
        if exist %SRC%\tls xcopy /e /i /y %SRC%\tls dist\tls >nul 2>&1
        if exist %SRC%\iconengines xcopy /e /i /y %SRC%\iconengines dist\iconengines >nul 2>&1
        if exist %SRC%\networkinformation xcopy /e /i /y %SRC%\networkinformation dist\networkinformation >nul 2>&1
        if exist %SRC%\position xcopy /e /i /y %SRC%\position dist\position >nul 2>&1
        if exist %SRC%\generic xcopy /e /i /y %SRC%\generic dist\generic >nul 2>&1
        if exist %SRC%\resources xcopy /e /i /y %SRC%\resources dist\resources >nul 2>&1
        if exist %SRC%\translations xcopy /e /i /y %SRC%\translations dist\translations >nul 2>&1
        xcopy /e /i /y frontend dist\frontend\
        if exist images xcopy /e /i /y images dist\images\ >nul 2>&1
      shell: cmd

    # ── Test ───────────────────────────────────────────────
    - name: Run UI test
      run: node test_scan.mjs "%USERPROFILE%"
      shell: cmd
      timeout-minutes: 5
      env:
        DISKraptor_CDP_PORT: 9222

    # ── Package ────────────────────────────────────────────
    - name: Package release zip
      run: |
        mkdir artifacts
        "%ProgramFiles%\7-Zip\7z.exe" a -tzip artifacts\DiskRaptor_v0.0.1.zip dist\*
      shell: cmd

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: diskraptor-build
        path: artifacts/

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/DiskRaptor_v0.0.1.zip
