name: Build DiskRaptor

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip aqtinstall
          aqt install-qt windows desktop 6.10.3 win64_msvc2022_64 --modules qtwebengine qtwebchannel qtpositioning -O C:\Qt
          aqt install-tool windows desktop tools_ninja -O C:\Qt
          aqt install-tool windows desktop tools_cmake -O C:\Qt

      - name: Install npm deps
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Setup Rust
        shell: pwsh
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Find VS
        id: findvs
        shell: pwsh
        run: |
          $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          "VS_PATH=$vs" >> $env:GITHUB_OUTPUT

      - name: Build Qt app
        shell: cmd
        run: |
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          set "PATH=C:\Qt\Tools\CMake_64\bin;C:\Qt\Tools\Ninja;%PATH%"
          set "Qt6_DIR=C:\Qt\6.10.3\msvc2022_64\lib\cmake\Qt6"
          set "CMAKE_PREFIX_PATH=C:\Qt\6.10.3\msvc2022_64"
          cd qt-app
          if exist build rmdir /s /q build
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="%Qt6_DIR%" -DCMAKE_PREFIX_PATH="%CMAKE_PREFIX_PATH%"
          cmake --build . --config Release
        env:
          VS_PATH: ${{ steps.findvs.outputs.VS_PATH }}

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item qt-app\build\DiskRaptor.exe dist\
          if (Test-Path src-tauri\target\release\diskraptor_scanner.dll) { Copy-Item src-tauri\target\release\diskraptor_scanner.dll dist\ }
          Copy-Item -Recurse frontend dist\frontend\
          if (Test-Path images) { Copy-Item -Recurse images dist\images\ }
          Copy-Item qt-app\build\*.dll dist\
          if (Test-Path qt-app\build\QtWebEngineProcess.exe) { Copy-Item qt-app\build\QtWebEngineProcess.exe dist\ }
          @("platforms","styles","imageformats","tls","iconengines","generic","networkinformation","position","resources","translations") | ForEach-Object {
            $p = "qt-app\build\$_"
            if (Test-Path $p) { Copy-Item -Recurse $p "dist\$_\" }
          }
          Remove-Item dist\DiskRaptorLauncher.exe -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath DiskRaptor-windows.zip -Force

      - name: Test
        shell: cmd
        run: node test_scan.mjs "%USERPROFILE%"
        timeout-minutes: 10
        continue-on-error: true
        env:
          DISKraptor_CDP_PORT: 9222

      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-windows
          path: DiskRaptor-windows.zip

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Qt
        run: |
          brew install qt@6 cmake ninja

      - name: Setup Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Build Qt app
        run: |
          export Qt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6"
          export CMAKE_PREFIX_PATH="$(brew --prefix qt@6)"
          cd qt-app
          rm -rf build
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="$Qt6_DIR" -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          cmake --build . --config Release

      - name: Package
        run: |
          mkdir -p dist
          if [ -d qt-app/build/DiskRaptor.app ]; then
            cp -R qt-app/build/DiskRaptor.app dist/
          else
            mkdir -p dist/DiskRaptor.app/Contents/MacOS
            mkdir -p dist/DiskRaptor.app/Contents/Resources
            cp qt-app/build/DiskRaptor dist/DiskRaptor.app/Contents/MacOS/
            cp -R frontend dist/DiskRaptor.app/Contents/Resources/
            [ -d images ] && cp -R images dist/DiskRaptor.app/Contents/Resources/
            [ -f images/icon.icns ] && cp images/icon.icns dist/DiskRaptor.app/Contents/Resources/
          fi
          # Bundle Qt frameworks
          QT_BIN="$(brew --prefix qt@6)/bin"
          if [ -f "$QT_BIN/macdeployqt" ]; then
            "$QT_BIN/macdeployqt" dist/DiskRaptor.app -verbose=1
          fi
          # Copy Rust scanner
          if [ -f src-tauri/target/release/libdiskraptor_scanner.dylib ]; then
            cp src-tauri/target/release/libdiskraptor_scanner.dylib dist/DiskRaptor.app/Contents/MacOS/
          fi
          cd dist
          zip -r ../DiskRaptor-macos.zip DiskRaptor.app

      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-macos
          path: DiskRaptor-macos.zip

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qt6-base-dev qt6-webengine-dev \
            cmake ninja-build pkg-config g++ zip \
            libglib2.0-dev libcairo2-dev libpango1.0-dev libatk1.0-dev \
            libgdk-pixbuf-2.0-dev libgtk-3-dev libxcb-cursor-dev \
            libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev

      - name: Setup Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Build Qt app
        run: |
          cd qt-app
          rm -rf build
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DQt6_DIR="/usr/lib/x86_64-linux-gnu/cmake/Qt6" \
            -DCMAKE_PREFIX_PATH="/usr/lib/x86_64-linux-gnu"
          cmake --build . --config Release

      - name: Package
        run: |
          mkdir -p dist/lib
          cp qt-app/build/DiskRaptor dist/
          cp -R frontend dist/frontend
          [ -d images ] && cp -R images dist/images
          if [ -f src-tauri/target/release/libdiskraptor_scanner.so ]; then
            cp src-tauri/target/release/libdiskraptor_scanner.so dist/
          fi
          for lib in Core Gui Widgets WebEngineCore WebEngineWidgets WebChannel Network OpenGL Positioning PrintSupport Qml QmlMeta QmlModels QmlWorkerScript Quick QuickWidgets Svg SerialPort; do
            for f in /usr/lib/x86_64-linux-gnu/libQt6${lib}.so*; do
              [ -f "$f" ] && cp -n "$f" dist/lib/ 2>/dev/null || true
            done
          done
          cat > dist/DiskRaptor.sh << 'EOF'
#!/bin/bash
cd "$(dirname "$0")"
export LD_LIBRARY_PATH="$PWD/lib:$LD_LIBRARY_PATH"
exec ./DiskRaptor "$@"
EOF
          chmod +x dist/DiskRaptor.sh
          cd dist
          zip -r ../DiskRaptor-linux.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-linux
          path: DiskRaptor-linux.zip

  release:
    name: Release
    needs: [windows, macos, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "DiskRaptor $GITHUB_REF_NAME" --notes "Automated release" 2>/dev/null || true
          for f in artifacts/*/*.zip; do
            [ -f "$f" ] && gh release upload "$GITHUB_REF_NAME" "$f" --clobber
          done
