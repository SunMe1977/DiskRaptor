name: Build and Release

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install npm deps
        run: npm install
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build release binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --release
      - name: Collect artifacts
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item "src-tauri/target/release/diskraptor.exe" "artifacts/DiskRaptor-Windows-x64.exe" -Force -ErrorAction SilentlyContinue
          Copy-Item "target/release/diskraptor.exe" "artifacts/DiskRaptor-Windows-x64.exe" -Force -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: artifacts/**
          retention-days: 7

  release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          ls -la artifacts/
          if [ -f artifacts/DiskRaptor-Windows-x64.exe ]; then
            cp artifacts/DiskRaptor-Windows-x64.exe release_assets/
          fi
          ls -la release_assets/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DiskRaptor ${{ github.ref_name }}
          body: "DiskRaptor ${{ github.ref_name }} — Windows x64 binary"
          files: release_assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
