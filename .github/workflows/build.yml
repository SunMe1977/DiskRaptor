name: Build DiskRaptor

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pip install aqtinstall && aqt install-qt windows desktop 6.10.3 win64_msvc2022_64 --modules qtwebengine qtwebchannel qtpositioning -O C:\Qt && aqt install-tool windows desktop tools_ninja -O C:\Qt && aqt install-tool windows desktop tools_cmake -O C:\Qt
      - run: rustup set profile minimal && rustup toolchain install stable && rustup default stable
      - run: cargo build --release
        working-directory: src-tauri
      - run: $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath; Push-Location "$vs\VC\Auxiliary\Build"; cmd /c "vcvars64.bat>nul&&set" | ForEach-Object { if ($_ -match "^(.*?)=(.*)") { Set-Item -Path "env:$($matches[1])" -Value $matches[2] } }; Pop-Location; $env:PATH = "C:\Qt\Tools\CMake_64\bin;C:\Qt\Tools\Ninja;$env:PATH"; cd qt-app; Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue; New-Item -ItemType Directory -Force -Path build | Out-Null; cd build; cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release "-DQt6_DIR=C:\Qt\6.10.3\msvc2022_64\lib\cmake\Qt6"; cmake --build . --config Release
      - run: New-Item -ItemType Directory -Force -Path dist | Out-Null; Copy-Item qt-app\build\DiskRaptor.exe dist\; Copy-Item src-tauri\target\release\diskraptor_scanner.dll dist\; Copy-Item qt-app\build\*.dll dist\; Copy-Item -Recurse frontend dist\frontend\; if (Test-Path images) { Copy-Item -Recurse images dist\images\ }; @("platforms","styles","imageformats","tls","iconengines","generic","networkinformation","position","resources","translations") | ForEach-Object { $src = "qt-app\build\$_"; if (Test-Path $src) { Copy-Item -Recurse $src "dist\$_\"; } }; Copy-Item qt-app\build\QtWebEngineProcess.exe dist\ -ErrorAction SilentlyContinue; Compress-Archive -Path dist\* -DestinationPath DiskRaptor-windows-x64.zip -Force
      - run: choco install nsis -y --no-progress && & "C:\Program Files (x86)\NSIS\makensis.exe" installer\nsis\DiskRaptor.nsi
      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-windows-x64
          path: |
            DiskRaptor-windows-x64.zip
            installer\nsis\DiskRaptor_*.exe

  windows-arm64:
    name: Windows ARM64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pip install aqtinstall && aqt install-qt windows desktop 6.10.3 win64_msvc2022_arm64 --modules qtwebengine qtwebchannel qtpositioning -O C:\Qt && aqt install-tool windows desktop tools_ninja -O C:\Qt && aqt install-tool windows desktop tools_cmake -O C:\Qt
      - run: rustup set profile minimal && rustup toolchain install stable && rustup default stable && rustup target add aarch64-pc-windows-msvc
      - run: cd src-tauri && cargo build --release --target aarch64-pc-windows-msvc
      - run: $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath; Push-Location "$vs\VC\Auxiliary\Build"; cmd /c "vcvars64.bat -arm64>nul&&set" | ForEach-Object { if ($_ -match "^(.*?)=(.*)") { Set-Item -Path "env:$($matches[1])" -Value $matches[2] } }; Pop-Location; $env:PATH = "C:\Qt\Tools\CMake_64\bin;C:\Qt\Tools\Ninja;$env:PATH"; cd qt-app; Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue; New-Item -ItemType Directory -Force -Path build | Out-Null; cd build; cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release "-DQt6_DIR=C:\Qt\6.10.3\msvc2022_arm64\lib\cmake\Qt6"; cmake --build . --config Release
      - run: New-Item -ItemType Directory -Force -Path dist | Out-Null; Copy-Item qt-app\build\DiskRaptor.exe dist\; Copy-Item src-tauri\target\aarch64-pc-windows-msvc\release\diskraptor_scanner.dll dist\; Copy-Item qt-app\build\*.dll dist\; Copy-Item -Recurse frontend dist\frontend\; if (Test-Path images) { Copy-Item -Recurse images dist\images\ }; @("platforms","styles","imageformats","tls","iconengines","generic","networkinformation","position","resources","translations") | ForEach-Object { $src = "qt-app\build\$_"; if (Test-Path $src) { Copy-Item -Recurse $src "dist\$_\"; } }; Copy-Item qt-app\build\QtWebEngineProcess.exe dist\ -ErrorAction SilentlyContinue; Compress-Archive -Path dist\* -DestinationPath DiskRaptor-windows-arm64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-windows-arm64
          path: DiskRaptor-windows-arm64.zip

  macos-x64:
    name: macOS Intel
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - run: brew install qt@6 cmake ninja
      - run: rustup set profile minimal && rustup toolchain install stable && rustup target add x86_64-apple-darwin
      - run: cd src-tauri && cargo build --release --target x86_64-apple-darwin
      - run: export Qt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6" && cd qt-app && rm -rf build && mkdir build && cd build && cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="$Qt6_DIR" && cmake --build . --config Release
      - name: Package
        run: |
          APP="dist/DiskRaptor.app"
          VER="${GITHUB_REF_NAME#v}"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp qt-app/build/DiskRaptor.app/Contents/MacOS/DiskRaptor "$APP/Contents/MacOS/"
          cp -R frontend "$APP/Contents/Resources/"
          [ -d images ] && cp -R images "$APP/Contents/Resources/"
          [ -f images/icon.icns ] && cp images/icon.icns "$APP/Contents/Resources/"
          sed "s/VERSION_PLACEHOLDER/$VER/g" installer/Info.plist.in > "$APP/Contents/Info.plist"
          QT_BIN="$(brew --prefix qt@6)/bin"
          if [ -f "$QT_BIN/macdeployqt" ]; then "$QT_BIN/macdeployqt" "$APP" -verbose=1; fi
          cp src-tauri/target/x86_64-apple-darwin/release/libdiskraptor_scanner.dylib "$APP/Contents/MacOS/"
          codesign --force --deep --sign - "$APP"
          cd dist && zip -r ../DiskRaptor-macos-x64.zip DiskRaptor.app && cd ..
          hdiutil create -volname DiskRaptor -srcfolder "$APP" -ov -format UDZO DiskRaptor-macos-x64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-macos-x64
          path: |
            DiskRaptor-macos-x64.zip
            DiskRaptor-macos-x64.dmg

  macos-arm64:
    name: macOS ARM64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install qt@6 cmake ninja
      - run: rustup set profile minimal && rustup toolchain install stable && rustup target add aarch64-apple-darwin
      - run: cd src-tauri && cargo build --release --target aarch64-apple-darwin
      - run: export Qt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6" && cd qt-app && rm -rf build && mkdir build && cd build && cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="$Qt6_DIR" && cmake --build . --config Release
      - name: Package
        run: |
          APP="dist/DiskRaptor.app"
          VER="${GITHUB_REF_NAME#v}"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp qt-app/build/DiskRaptor.app/Contents/MacOS/DiskRaptor "$APP/Contents/MacOS/"
          cp -R frontend "$APP/Contents/Resources/"
          [ -d images ] && cp -R images "$APP/Contents/Resources/"
          [ -f images/icon.icns ] && cp images/icon.icns "$APP/Contents/Resources/"
          sed "s/VERSION_PLACEHOLDER/$VER/g" installer/Info.plist.in > "$APP/Contents/Info.plist"
          QT_BIN="$(brew --prefix qt@6)/bin"
          if [ -f "$QT_BIN/macdeployqt" ]; then "$QT_BIN/macdeployqt" "$APP" -verbose=1; fi
          cp src-tauri/target/aarch64-apple-darwin/release/libdiskraptor_scanner.dylib "$APP/Contents/MacOS/"
          codesign --force --deep --sign - "$APP"
          cd dist && zip -r ../DiskRaptor-macos-arm64.zip DiskRaptor.app && cd ..
          hdiutil create -volname DiskRaptor -srcfolder "$APP" -ov -format UDZO DiskRaptor-macos-arm64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-macos-arm64
          path: |
            DiskRaptor-macos-arm64.zip
            DiskRaptor-macos-arm64.dmg

  linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq qt6-base-dev qt6-webengine-dev cmake ninja-build pkg-config g++ zip libglib2.0-dev libcairo2-dev libpango1.0-dev libatk1.0-dev libgdk-pixbuf-2.0-dev libgtk-3-dev
      - run: rustup set profile minimal && rustup toolchain install stable && rustup default stable
      - run: cargo build --release
        working-directory: src-tauri
      - run: cd qt-app && rm -rf build && mkdir build && cd build && cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="/usr/lib/x86_64-linux-gnu/cmake/Qt6" && cmake --build . --config Release
      - name: Package
        run: |
          mkdir -p dist/lib
          cp qt-app/build/DiskRaptor dist/
          cp -R frontend dist/frontend
          [ -d images ] && cp -R images dist/images
          [ -f src-tauri/target/release/libdiskraptor_scanner.so ] && cp src-tauri/target/release/libdiskraptor_scanner.so dist/
          for lib in Core Gui Widgets WebEngineCore WebEngineWidgets WebChannel Network OpenGL Positioning PrintSupport Qml Quick Svg; do
            for f in /usr/lib/x86_64-linux-gnu/libQt6${lib}.so*; do [ -f "$f" ] && cp -n "$f" dist/lib/ 2>/dev/null || true; done
          done
          cat > dist/DiskRaptor.sh << 'SCRIPT'
          #!/bin/bash
          cd "$(dirname "$0")"
          export LD_LIBRARY_PATH="$PWD/lib:$LD_LIBRARY_PATH"
          exec ./DiskRaptor "$@"
          SCRIPT
          chmod +x dist/DiskRaptor.sh
          cd dist && zip -r ../DiskRaptor-linux-x64.zip .
          cd ..
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p deb/DEBIAN
          cat > deb/DEBIAN/control << 'CONTROL'
          Package: diskraptor
          Version: 0.0.1
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: DiskRaptor Team
          Description: Ultra-fast disk space analyzer
          Depends: libglib2.0-0, libcairo2, libpango-1.0-0, libatk1.0-0, libgdk-pixbuf-2.0-0, libgtk-3-0
          CONTROL
          mkdir -p deb/usr/bin deb/usr/lib
          cp dist/DiskRaptor deb/usr/bin/
          cp dist/DiskRaptor.sh deb/usr/bin/
          cp -r dist/lib/*.so* deb/usr/lib/ 2>/dev/null || true
          mkdir -p deb/usr/share/icons/hicolor/128x128/apps
          [ -f images/128x128@2x.png ] && cp images/128x128@2x.png deb/usr/share/icons/hicolor/128x128/apps/diskraptor.png
          dpkg-deb --build deb "DiskRaptor_${VERSION}_amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-linux-x64
          path: |
            DiskRaptor-linux-x64.zip
            DiskRaptor_*_amd64.deb

  linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq qt6-base-dev qt6-webengine-dev cmake ninja-build pkg-config g++ zip libglib2.0-dev libcairo2-dev libpango1.0-dev libatk1.0-dev libgdk-pixbuf-2.0-dev libgtk-3-dev
      - run: rustup set profile minimal && rustup toolchain install stable && rustup default stable
      - run: cargo build --release
        working-directory: src-tauri
      - run: cd qt-app && rm -rf build && mkdir build && cd build && cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="/usr/lib/aarch64-linux-gnu/cmake/Qt6" && cmake --build . --config Release
      - name: Package
        run: |
          mkdir -p dist/lib
          cp qt-app/build/DiskRaptor dist/
          cp -R frontend dist/frontend
          [ -d images ] && cp -R images dist/images
          [ -f src-tauri/target/release/libdiskraptor_scanner.so ] && cp src-tauri/target/release/libdiskraptor_scanner.so dist/
          for lib in Core Gui Widgets WebEngineCore WebEngineWidgets WebChannel Network OpenGL Positioning PrintSupport Qml Quick Svg; do
            for f in /usr/lib/aarch64-linux-gnu/libQt6${lib}.so*; do [ -f "$f" ] && cp -n "$f" dist/lib/ 2>/dev/null || true; done
          done
          cat > dist/DiskRaptor.sh << 'SCRIPT'
          #!/bin/bash
          cd "$(dirname "$0")"
          export LD_LIBRARY_PATH="$PWD/lib:$LD_LIBRARY_PATH"
          exec ./DiskRaptor "$@"
          SCRIPT
          chmod +x dist/DiskRaptor.sh
          cd dist && zip -r ../DiskRaptor-linux-arm64.zip .
          cd ..
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p deb/DEBIAN
          cat > deb/DEBIAN/control << 'CONTROL'
          Package: diskraptor
          Version: 0.0.1
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: DiskRaptor Team
          Description: Ultra-fast disk space analyzer
          Depends: libglib2.0-0, libcairo2, libpango-1.0-0, libatk1.0-0, libgdk-pixbuf-2.0-0, libgtk-3-0
          CONTROL
          mkdir -p deb/usr/bin deb/usr/lib
          cp dist/DiskRaptor deb/usr/bin/
          cp dist/DiskRaptor.sh deb/usr/bin/
          cp -r dist/lib/*.so* deb/usr/lib/ 2>/dev/null || true
          mkdir -p deb/usr/share/icons/hicolor/128x128/apps
          [ -f images/128x128@2x.png ] && cp images/128x128@2x.png deb/usr/share/icons/hicolor/128x128/apps/diskraptor.png
          dpkg-deb --build deb "DiskRaptor_${VERSION}_arm64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-linux-arm64
          path: |
            DiskRaptor-linux-arm64.zip
            DiskRaptor_*_arm64.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-x64, windows-arm64, macos-x64, macos-arm64, linux-x64, linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la artifacts/
          for f in artifacts/*; do
            if [ -f "$f" ]; then
              echo "Uploading: $f ($(stat -c%s "$f") bytes)"
              gh release upload "$GITHUB_REF_NAME" "$f" --clobber -R "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
            fi
          done