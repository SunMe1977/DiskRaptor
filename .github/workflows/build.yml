name: Build and Release

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ══════════════════════════════════════════════════════════════
  # UI TEST MATRIX — runs on ALL three OS
  # ══════════════════════════════════════════════════════════════
  ui-test:
    name: UI Test ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            display: Windows
          - os: macos-latest
            display: macOS
          - os: ubuntu-22.04
            display: Linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install npm deps
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run UI test matrix
        id: test
        run: node run-uitest.mjs --json --file=uitest-matrix.html
        continue-on-error: true
      - name: Save test results
        shell: bash
        run: |
          node run-uitest.mjs --json --file=uitest-matrix.html > uitest-result-${{ matrix.display }}.json 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: uitest-result-${{ matrix.display }}
          path: uitest-result-${{ matrix.display }}.json
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # BUILD
  # ══════════════════════════════════════════════════════════════
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: diskraptor.exe
            asset_bin: DiskRaptor-Windows-x64.exe
            install_wix: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: diskraptor
            asset_bin: DiskRaptor-macOS-x64
            install_wix: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: diskraptor
            asset_bin: DiskRaptor-Linux-x64
            install_wix: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install npm deps
        run: npm install
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: "rust-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            librsvg2-dev \
            libsoup2.4-dev \
            libglib2.0-dev \
            patchelf \
            libayatana-appindicator3-dev \
            libfuse2 \
            libfuse-dev \
            xvfb \
            libdbus-1-dev \
            libssl-dev \
            wget
          # Ensure AppImage dependencies
          if ! command -v appimagetool &> /dev/null; then
            wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool 2>/dev/null || true
            chmod +x /usr/local/bin/appimagetool 2>/dev/null || true
          fi

      - name: Install WiX (required for MSI on Windows)
        if: matrix.install_wix
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress --limit-output -y

      - name: Build + bundle with Tauri (Windows)
        if: matrix.os == 'windows-latest'
        run: npx tauri build --bundles msi

      - name: Build + bundle with Tauri (macOS)
        if: matrix.os == 'macos-latest'
        run: npx tauri build --bundles dmg

      - name: Build + bundle with Tauri (Linux) — binary + .deb
        if: matrix.os == 'ubuntu-22.04'
        timeout-minutes: 20
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: UTC
        run: npx tauri build --bundles deb

      - name: Build self-contained AppImage (Linux)
        if: matrix.os == 'ubuntu-22.04'
        timeout-minutes: 10
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          bash build-appimage.sh

      - name: Verify and test .deb package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        timeout-minutes: 5
        run: |
          set -x
          DEB_FILE=$(find target/release/bundle/deb -name "*.deb" | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "❌ No .deb file found"
            exit 1
          fi
          echo "📦 Found .deb: $DEB_FILE"

          # Verify control file has runtime deps (not -dev)
          dpkg-deb --info "$DEB_FILE" > deb_info.txt
          grep -i "Depends:" deb_info.txt || echo "No Depends field"
          if grep -q "-dev" deb_info.txt; then
            echo "❌ ERROR: .deb contains -dev dependency!"
            exit 1
          fi
          echo "✅ No -dev dependencies"

          # Install with apt (auto-installs all required deps)
          echo "📦 Installing with apt..."
          DEBIAN_FRONTEND=noninteractive sudo apt install -y --fix-broken "./$DEB_FILE" 2>&1
          echo "✅ apt install completed"

          # Verify binary
          if command -v diskraptor &>/dev/null; then
            echo "✅ Binary in PATH: $(which diskraptor)"
          else
            dpkg -L diskraptor 2>/dev/null || dpkg -L disk-raptor 2>/dev/null || echo "Package files:"
          fi
          echo "✅ .deb test passed"

      - name: Integration test — start AppImage + verify WebView (Linux)
        if: matrix.os == 'ubuntu-22.04'
        timeout-minutes: 3
        run: |
          APPIMAGE=$(find . -name "DiskRaptor-x86_64.AppImage" -o -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "⚠️ No AppImage found"
            exit 0
          fi
          chmod +x "$APPIMAGE"

          # Start Xvfb for headless display
          if command -v Xvfb &>/dev/null; then
            Xvfb :99 -screen 0 1280x720x24 &>/dev/null &
            XVFB_PID=$!
            sleep 1
            export DISPLAY=:99
          fi

          echo "Testing AppImage: $APPIMAGE"
          node test-appimage.mjs "$APPIMAGE" 2>&1 || true

          if [ -n "${XVFB_PID:-}" ]; then
            kill $XVFB_PID 2>/dev/null || true
          fi

      - name: Collect artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $dir = "target/release"
          if (Test-Path "$dir/${{ matrix.binary }}") {
            Copy-Item "$dir/${{ matrix.binary }}" "artifacts/${{ matrix.asset_bin }}" -Force
          }
          $bundleDirs = @("$dir/bundle/msi", "$dir/bundle/nsis")
          foreach ($bd in $bundleDirs) {
            if (Test-Path $bd) {
              Get-ChildItem -File $bd | ForEach-Object {
                Copy-Item $_.FullName "artifacts/" -Force
              }
            }
          }
          Get-ChildItem artifacts

      - name: Collect artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p artifacts
          RELDIR="target/release"
          if [ -f "$RELDIR/${{ matrix.binary }}" ]; then
            cp "$RELDIR/${{ matrix.binary }}" "artifacts/${{ matrix.asset_bin }}"
          fi
          for dir in "$RELDIR/bundle/dmg"; do
            if [ -d "$dir" ]; then
              cp "$dir"/* artifacts/ 2>/dev/null || true
            fi
          done
          ls -la artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p artifacts
          RELDIR="target/release"
          if [ -f "$RELDIR/${{ matrix.binary }}" ]; then
            cp "$RELDIR/${{ matrix.binary }}" "artifacts/${{ matrix.asset_bin }}"
          fi
          # Custom self-contained AppImage (works on ALL distros)
          if [ -f "DiskRaptor-x86_64.AppImage" ]; then
            cp "DiskRaptor-x86_64.AppImage" artifacts/
          fi
          # Tauri-built .deb
          for dir in "$RELDIR/bundle/deb"; do
            if [ -d "$dir" ]; then
              cp "$dir"/* artifacts/ 2>/dev/null || true
            fi
          done
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: artifacts/**
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # INSTALLER TEST — installs real MSI/DMG/DEB, launches app, runs tests
  # ══════════════════════════════════════════════════════════════
  install-test:
    name: Install Test ${{ matrix.os }}
    if: github.ref_type == 'tag'
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            display: Windows
            artifact_name: release-windows-latest
            test_flag: --os=win
          - os: macos-latest
            display: macOS
            artifact_name: release-macos-latest
            test_flag: --os=mac
          - os: ubuntu-22.04
            display: Linux
            artifact_name: release-ubuntu-22.04
            test_flag: --os=linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install npm deps
        run: npm install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts

      - name: List artifacts
        shell: bash
        run: ls -la artifacts/

      - name: Install and test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Installing MSI..."
          $msi = Get-ChildItem artifacts -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Write-Host "Found MSI: $($msi.FullName)"
            Start-Process msiexec -ArgumentList "/i `"$($msi.FullName)`" /qn /norestart" -Wait -NoNewWindow
            Write-Host "MSI installed. Waiting..."
            Start-Sleep -Seconds 5
            Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*" | Where-Object { $_.DisplayName -like "*DiskRaptor*" } | Format-List
          } else {
            Write-Host "No MSI found, listing all files:"
            Get-ChildItem artifacts -Recurse
          }

      - name: Install and test (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          DMG=$(find artifacts -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            echo "Mounting DMG: $DMG"
            hdiutil attach "$DMG" -nobrowse -mountpoint /Volumes/DiskRaptor
            APP=$(find /Volumes/DiskRaptor -name "*.app" -maxdepth 3 | head -1)
            if [ -n "$APP" ]; then
              echo "Copying to /Applications..."
              cp -R "$APP" /Applications/
              hdiutil detach /Volumes/DiskRaptor -quiet
              echo "✅ App installed to /Applications"
            fi
          else
            echo "No DMG found"
          fi

      - name: Install and test (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          DEB=$(find artifacts -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            echo "Installing DEB: $DEB"
            DEBIAN_FRONTEND=noninteractive sudo apt install -y --fix-broken "./$DEB" 2>&1
            echo "✅ DEB installed"
            which diskraptor 2>/dev/null && echo "Binary in PATH" || echo "Binary not in PATH"
          fi
          # Also prepare AppImage
          APPIMAGE=$(find artifacts -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            echo "✅ AppImage ready: $APPIMAGE"
          fi

      - name: Run integration test against installed app
        env:
          DISPLAY: ":99"
        run: |
          if command -v Xvfb &>/dev/null; then
            Xvfb :99 -screen 0 1280x720x24 &>/dev/null &
            sleep 1
          fi
          node install-test.mjs ${{ matrix.test_flag }} 2>&1 || echo "Integration test completed with issues"

      - name: Save install test results
        run: node install-test.mjs ${{ matrix.test_flag }} 2>&1 | tee install-result-${{ matrix.display }}.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: install-result-${{ matrix.display }}
          path: install-result-${{ matrix.display }}.json
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # README MATRIX GENERATION
  # ══════════════════════════════════════════════════════════════
  generate-matrix:
    name: Generate Test Matrix
    if: always()
    needs: [ui-test, install-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: uitest-result-*
          merge-multiple: true
          path: uitest-results

      - name: Generate test matrix table
        id: matrix
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const resultsDir = 'uitest-results';
          const platforms = { 'Windows': null, 'macOS': null, 'Linux': null };

          // Read all result files
          const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('.json'));
          for (const file of files) {
            const content = fs.readFileSync(path.join(resultsDir, file), 'utf8');
            try {
              const data = JSON.parse(content);
              if (data && data.platform && platforms[data.platform] !== undefined) {
                platforms[data.platform] = data;
              }
            } catch(e) {
              console.log('Parse error for', file, e.message);
            }
          }

          // Build test sets from all platforms
          const allTestIds = new Set();
          for (const p of Object.values(platforms)) {
            if (p && p.tests) {
              p.tests.forEach(t => allTestIds.add(t.id));
            }
          }

          const testIds = [...allTestIds].sort();
          // Define category names
          const catNames = {
            A: 'Toolbar & Header', B: 'Button Click Actions', C: 'Tree View',
            D: 'Context Menus', E: 'Stats Panel', F: 'Selection Panel',
            G: 'Top 50 Files', H: 'Diagram', I: 'Progress Overlay',
            J: 'Language Switcher', K: 'Menu Events', L: 'Duplicate Scanner',
            M: 'Edge Cases'
          };
          const catEmoji = { A: '🛠️', B: '🖱️', C: '🌳', D: '📋', E: '📊', F: '🔍',
            G: '🏆', H: '📈', I: '⏳', J: '🌐', K: '📝', L: '🔎', M: '⚠️' };

          // Generate markdown
          let md = '## 🧪 Cross-Platform UI Test Matrix\\n\\n';
          md += '> Last updated: ' + new Date().toISOString().split('T')[0] + '\\n\\n';
          md += '| # | Test | Windows | macOS | Linux |\\n';
          md += '|---|---|---|---|---|\\n';

          let lastCat = '';
          for (const id of testIds) {
            const cat = id[0];
            if (cat !== lastCat) {
              const name = catNames[cat] || 'Unknown';
              const emoji = catEmoji[cat] || '📌';
              md += '| **' + cat + '** | **' + emoji + ' ' + name + '** | | | |\\n';
              lastCat = cat;
            }

            const getStatus = (p) => {
              if (!p || !p.tests) return '⚪ N/A';
              const t = p.tests.find(x => x.id === id);
              if (!t) return '⚪ N/A';
              return t.status === 'passed' ? '🟢 Passed' : '🔴 Failed';
            };

            const w = getStatus(platforms.Windows);
            const m = getStatus(platforms.macOS);
            const l = getStatus(platforms.Linux);

            // Get test name from any platform
            let testName = id;
            for (const p of Object.values(platforms)) {
              if (p && p.tests) {
                const t = p.tests.find(x => x.id === id);
                if (t && t.name) { testName = t.name; break; }
              }
            }
            md += '| ' + id + ' | ' + testName + ' | ' + w + ' | ' + m + ' | ' + l + ' |\\n';
          }

          // Summary row
          md += '\\n### 📊 Platform Summary\\n\\n';
          md += '| Platform | Passed | Failed | Total | Success Rate |\\n';
          md += '|---|---|---|---|---|\\n';
          for (const [name, data] of Object.entries(platforms)) {
            if (data) {
              const rate = data.total > 0 ? ((data.passed / data.total) * 100).toFixed(1) + '%' : 'N/A';
              md += '| **' + name + '** | ' + data.passed + ' | ' + data.failed + ' | ' + data.total + ' | ' + rate + ' |\\n';
            } else {
              md += '| **' + name + '** | ❌ No data | ❌ No data | ❌ No data | ❌ |\\n';
            }
          }

          fs.writeFileSync('TEST_MATRIX.md', md);
          console.log('TEST_MATRIX.md generated');
          "
      - name: Upload test matrix
        uses: actions/upload-artifact@v4
        with:
          name: test-matrix
          path: TEST_MATRIX.md
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # RELEASE
  # ══════════════════════════════════════════════════════════════
  release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs: [build, install-test, generate-matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Clean old artifacts
        run: rm -rf artifacts release_assets

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: test-matrix
          path: .

      - name: Prepare release assets (unique by version)
        run: |
          mkdir -p release_assets
          ls -la artifacts/
          for f in artifacts/*; do
            base=$(basename "$f")
            # Only copy files that match current or no version
            if echo "$base" | grep -qE "0\\.2\\.(0|1|2|3)" 2>/dev/null; then
              echo "Skipping old: $base"
              continue
            fi
            cp "$f" release_assets/
            echo "Added: $base"
          done
          if [ -z "$(ls -A release_assets/ 2>/dev/null)" ]; then
            cp artifacts/* release_assets/ 2>/dev/null || true
          fi
          if [ -f TEST_MATRIX.md ]; then
            cp TEST_MATRIX.md release_assets/
          fi
          ls -la release_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DiskRaptor ${{ github.ref_name }}
          body: |
            ## DiskRaptor ${{ github.ref_name }}

            | Platform | Downloads | Notes |
            |----------|-----------|-------|
            | **Windows** | `.msi` installer or `.exe` | Windows 10+ |
            | **macOS** | `.dmg` or `DiskRaptor-macOS-x64` | macOS 11+ (unsigned) |
            | **Linux** 🐧 | `DiskRaptor-x86_64.AppImage` | ✅ Works on ALL distros — no install needed |
            | **Linux** 🐧 | `disk-raptor_*.deb` | ✅ Ubuntu 20.04/22.04 |

            ## 🧪 UI Test Results

            See [TEST_MATRIX.md](TEST_MATRIX.md) for the full cross-platform test matrix.

            > ⚠️ macOS & Linux builds are unsigned. On macOS: right-click → Open.
            >
            > **Linux**:
            > - **AppImage (recommended ✅)** — works on ALL Linux distros, no install needed:
            >   ```bash
            >   chmod +x DiskRaptor-x86_64.AppImage && ./DiskRaptor-x86_64.AppImage
            >   ```
            > - **.deb** (Ubuntu 20.04 / 22.04): `sudo apt install ./disk-raptor_*.deb`
            >
            > **Windows**: Run the `.msi` installer or the `.exe` directly.
          files: release_assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
