name: Build & Test DiskRaptor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt (aqtinstall)
      shell: pwsh
      run: |
        pip install aqtinstall
        aqt install-qt --outputdir C:\Qt windows desktop 6.10.3 win64_msvc2022_64 --modules qtwebengine qtwebchannel
        "Qt6_DIR=C:\Qt\6.10.3\win64_msvc2022_64\lib\cmake\Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Setup MSVC dev prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci --ignore-scripts
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    - name: Debug pre-build
      shell: pwsh
      run: |
        Write-Host "=== Qt dirs ==="
        Get-ChildItem "C:\Qt\6.10.3" -ErrorAction SilentlyContinue | Select-Object FullName | Format-Table -AutoSize
        Write-Host "=== PATH cmake ==="
        Get-Command cmake.exe -ErrorAction SilentlyContinue | Select-Object Source
        Write-Host "=== Env ==="
        Write-Host "Qt6_DIR: $env:Qt6_DIR"

    # ── Build ──────────────────────────────────────────────
    - name: Build Rust scanner DLL
      run: cargo build --release
      working-directory: src-tauri

    - name: Build Qt app
      shell: cmd
      run: |
        echo === Qt6_DIR env ===
        dir "%Qt6_DIR%" 2>nul && ( echo Qt6_DIR: %Qt6_DIR% ) || ( echo Qt6_DIR not found: %Qt6_DIR% & exit /b 1 )
        echo === vcvarsall ===
        for %%f in (
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat"
          "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvarsall.bat"
          "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat"
          "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\VC\Auxiliary\Build\vcvarsall.bat"
        ) do (
          if exist %%f ( echo Found: %%f & call %%f x64 & goto :msvc_ok )
        )
        echo WARNING: No vcvarsall.bat found, trying cmake without MSVC env
        :msvc_ok
        echo === tools ===
        where cl.exe || echo NO cl
        where rc.exe || echo NO rc
        where link.exe || echo NO link
        pushd qt-app
        if exist build rmdir /s /q build
        mkdir build
        pushd build
        echo === cmake configure ===
        cmake .. -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="%Qt6_DIR%" 2>&1
        if errorlevel 1 (
          if exist CMakeFiles\CMakeError.log type CMakeFiles\CMakeError.log
          exit /b 1
        )
        echo === cmake build ===
        cmake --build . --config Release 2>&1
        if errorlevel 1 exit /b 1
        popd
        popd

    - name: Stage dist
      shell: cmd
      run: |
        if exist qt-app\build\Release\DiskRaptor.exe ( set SRC=qt-app\build\Release ) else ( set SRC=qt-app\build )
        echo Staging from %SRC%
        if not exist dist mkdir dist
        if exist %SRC%\DiskRaptor.exe copy %SRC%\DiskRaptor.exe dist\
        if exist %SRC%\diskraptor_scanner.dll copy %SRC%\diskraptor_scanner.dll dist\
        if exist %SRC%\QtWebEngineProcess.exe copy %SRC%\QtWebEngineProcess.exe dist\
        copy %SRC%\*.dll dist\ >nul 2>&1
        for %%d in (platforms styles imageformats tls iconengines networkinformation position generic resources translations) do (
          if exist %SRC%\%%d xcopy /e /i /y %SRC%\%%d dist\%%d >nul 2>&1
        )
        xcopy /e /i /y frontend dist\frontend\ >nul 2>&1
        if exist images xcopy /e /i /y images dist\images\ >nul 2>&1
        dir dist\ /b

    - name: Verify dist artifacts
      shell: pwsh
      run: |
        $exe = Test-Path dist/DiskRaptor.exe
        $dll = Test-Path dist/diskraptor_scanner.dll
        $qtw = Test-Path dist/QtWebEngineProcess.exe
        if (-not $exe) { throw "Missing DiskRaptor.exe" }
        Write-Host "DiskRaptor.exe: $exe, scanner DLL: $dll, WebEngine: $qtw"

    # ── Test ───────────────────────────────────────────────
    - name: Run UI test
      run: node test_scan.mjs "%USERPROFILE%"
      shell: cmd
      timeout-minutes: 15
      env:
        DISKraptor_CDP_PORT: 9222

    # ── Package ────────────────────────────────────────────
    - name: Get version
      id: version
      shell: pwsh
      run: |
        $ver = (Select-String -Path qt-app/CMakeLists.txt -Pattern 'project\(DiskRaptor VERSION ([0-9.]+)').Matches[0].Groups[1].Value
        if (-not $ver) { $ver = "0.0.7" }
        "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Package release zip
      shell: cmd
      run: |
        if not exist artifacts mkdir artifacts
        "%ProgramFiles%\7-Zip\7z.exe" a -tzip artifacts\DiskRaptor_v%VER%.zip .\dist\*
      env:
        VER: ${{ steps.version.outputs.version }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: diskraptor-windows-build
        path: artifacts/
        compression-level: 0

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/DiskRaptor_v*.zip
        fail_on_unmatched_files: true
