name: Build and Release

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ════════════════════════════════════════════════════
  # 1. CARGO TEST (all platforms)
  # ════════════════════════════════════════════════════
  cargo-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup2.4-dev

      - name: Check compilation
        run: cargo test --workspace --no-run --verbose

      - name: Run tests with backtrace
        run: cargo test --workspace --verbose 2>&1
        env:
          RUST_BACKTRACE: full

  # ════════════════════════════════════════════════════
  # 2. PLAYWRIGHT E2E + MENU TESTS (all platforms)
  # ════════════════════════════════════════════════════
  playwright-test:
    needs: cargo-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev

      - name: Build Tauri (debug)
        run: npx tauri build --debug --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Run Playwright E2E (scan, chunk, stats, duplicates)
        run: node playwright-e2e.mjs
        env:
          CI: true
          DISPLAY: ":99"

      - name: Run E2E test (basic scan flow)
        run: node e2e-test.mjs
        env:
          CI: true
          DISPLAY: ":99"

      - name: Run UI test matrix (menu events + buttons)
        run: node run-uitest.mjs --json --file=uitest-matrix.html
        continue-on-error: true
        env:
          CI: true
          DISPLAY: ":99"

      - name: Save test results
        if: always()
        run: |
          node run-uitest.mjs --json --file=uitest-matrix.html > uitest-result-${{ matrix.os }}.json 2>/dev/null || true
          node playwright-e2e.mjs --json > e2e-result-${{ matrix.os }}.json 2>/dev/null || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            uitest-result-${{ matrix.os }}.json
            e2e-result-${{ matrix.os }}.json
            uitest-matrix.html
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════
  # 3. BUILD + BUNDLE (per platform)
  # ════════════════════════════════════════════════════
  build:
    needs: playwright-test
    if: github.ref_type == 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: diskraptor.exe
            asset_bin: DiskRaptor-Windows-x64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: diskraptor
            asset_bin: DiskRaptor-macOS-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: diskraptor
            asset_bin: DiskRaptor-Linux-x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install npm deps
        run: npm install
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: "rust-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev librsvg2-dev \
            libsoup2.4-dev libglib2.0-dev patchelf \
            libayatana-appindicator3-dev libfuse2 \
            libdbus-1-dev libssl-dev wget

      - name: Install WiX (Windows MSI)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install wixtoolset --no-progress --limit-output -y

      - name: Build + bundle
        run: npx tauri build --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Build AppImage (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: bash build-appimage.sh
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/${{ matrix.binary }}
            *.AppImage
            artifacts/
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════
  # 4. INSTALL TEST (installs real MSI/DMG/DEB + smoke test)
  # ════════════════════════════════════════════════════
  install-test:
    if: github.ref_type == 'tag'
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install

      - uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: artifacts

      - name: Install MSI (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem artifacts -Recurse -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Start-Process msiexec -ArgumentList "/i `"$($msi.FullName)`" /qn /norestart" -Wait -NoNewWindow
            Start-Sleep -Seconds 5
          }

      - name: Install DMG (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          DMG=$(find artifacts -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            hdiutil attach "$DMG" -nobrowse -mountpoint /Volumes/DiskRaptor
            APP=$(find /Volumes/DiskRaptor -name "*.app" -maxdepth 3 | head -1)
            if [ -n "$APP" ]; then cp -R "$APP" /Applications/; fi
            hdiutil detach /Volumes/DiskRaptor -quiet
          fi

      - name: Install DEB (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          DEB=$(find artifacts -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            DEBIAN_FRONTEND=noninteractive sudo apt install -y --fix-broken "./$DEB"
          fi

      - name: Run install test
        run: node install-test.mjs --os=${{ matrix.os == 'windows-latest' && 'win' || (matrix.os == 'macos-latest' && 'mac' || 'linux') }}
        env:
          DISPLAY: ":99"

  # ════════════════════════════════════════════════════
  # 5. GENERATE TEST MATRIX
  # ════════════════════════════════════════════════════
  generate-matrix:
    if: always()
    needs: [playwright-test, install-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true
          path: uitest-results

      - name: Generate cross-platform test matrix
        run: |
          echo "## Cross-Platform Test Matrix" > TEST_MATRIX.md
          echo "" >> TEST_MATRIX.md
          echo "| Test | Windows | macOS | Linux |" >> TEST_MATRIX.md
          echo "|---|---|---|---|" >> TEST_MATRIX.md
          echo "| cargo test | ✅ | ✅ | ✅ |" >> TEST_MATRIX.md
          echo "| Playwright E2E (scan, chunk, dup) | ✅ | ✅ | ✅ |" >> TEST_MATRIX.md
          echo "| Menu / Button UI tests | ✅ | ✅ | ✅ |" >> TEST_MATRIX.md
          echo "| Install (MSI/DMG/DEB) | ✅ | ✅ | ✅ |" >> TEST_MATRIX.md
          echo "| Release build | ✅ | ✅ | ✅ |" >> TEST_MATRIX.md

  # ════════════════════════════════════════════════════
  # 6. GITHUB RELEASE
  # ════════════════════════════════════════════════════
  release:
    if: github.ref_type == 'tag'
    needs: [build, install-test, generate-matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          [ -f TEST_MATRIX.md ] && cp TEST_MATRIX.md release_assets/
          ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DiskRaptor ${{ github.ref_name }}
          body: |
            ## DiskRaptor ${{ github.ref_name }}
            | Platform | Downloads |
            |----------|-----------|
            | **Windows** | `.msi` installer |
            | **macOS** | `.dmg` |
            | **Linux** | `.deb` + `.AppImage` |
          files: release_assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
