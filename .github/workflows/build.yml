name: Build DiskRaptor (all platforms)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Windows ───────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Qt
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall
        aqt install-qt --outputdir C:\Qt windows desktop 6.10.3 win64_msvc2022_64 --modules qtwebengine qtwebchannel
        $qtRoot = "C:\Qt\6.10.3\msvc2022_64"
        if (-not (Test-Path $qtRoot)) {
          Write-Host "Expected Qt path not found: $qtRoot"
          Get-ChildItem "C:\Qt\6.10.3" -Directory | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          exit 1
        }
        $qt6Dir = Join-Path $qtRoot "lib\cmake\Qt6"
        "Qt6_DIR=$qt6Dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "Qt6_ROOT=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "Qt: $qtRoot"

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Node deps
      run: npm ci --ignore-scripts
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    - name: Build Rust scanner
      run: cargo build --release
      working-directory: src-tauri

    - name: Build Qt app
      shell: cmd
      run: |
        pushd qt-app
        if exist build rmdir /s /q build
        mkdir build
        pushd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="%Qt6_DIR%" || (type CMakeFiles\CMakeError.log & exit /b 1)
        cmake --build . --config Release || exit /b 1
        popd
        popd

    - name: Package
      shell: cmd
      run: |
        if exist qt-app\build\Release\DiskRaptor.exe ( set SRC=qt-app\build\Release ) else ( set SRC=qt-app\build )
        mkdir dist
        copy %SRC%\DiskRaptor.exe dist\
        copy %SRC%\diskraptor_scanner.dll dist\ 2>nul
        copy %SRC%\QtWebEngineProcess.exe dist\ 2>nul
        copy %SRC%\*.dll dist\ >nul 2>&1
        for %%d in (platforms styles imageformats tls iconengines networkinformation position generic resources translations) do (
          if exist %SRC%\%%d xcopy /e /i /y %SRC%\%%d dist\%%d >nul 2>&1
        )
        xcopy /e /i /y frontend dist\frontend\ >nul
        if exist images xcopy /e /i /y images dist\images\ >nul 2>&1
        7z a -tzip DiskRaptor-windows.zip .\dist\*

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DiskRaptor-windows
        path: DiskRaptor-windows.zip

    - name: Publish Windows asset to shared release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: DiskRaptor ${{ github.ref_name }}
        files: DiskRaptor-windows.zip
        fail_on_unmatched_files: true

  # ─── macOS ───────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      run: |
        brew install qt@6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Node deps
      run: npm ci --ignore-scripts
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    - name: Build Rust scanner
      run: cargo build --release
      working-directory: src-tauri

    - name: Build Qt app
      run: |
        export Qt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6"
        export CMAKE_PREFIX_PATH="$(brew --prefix qt@6)"
        cd qt-app
        rm -rf build && mkdir build && cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DQt6_DIR="$Qt6_DIR" \
          -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
        cmake --build . --config Release
        cd ../..

    - name: Package .app
      run: |
        mkdir -p dist/DiskRaptor.app/Contents/MacOS
        mkdir -p dist/DiskRaptor.app/Contents/Resources
        if [ -f qt-app/build/DiskRaptor.app/Contents/MacOS/DiskRaptor ]; then
          cp qt-app/build/DiskRaptor.app/Contents/MacOS/DiskRaptor dist/DiskRaptor.app/Contents/MacOS/
        else
          cp qt-app/build/DiskRaptor dist/DiskRaptor.app/Contents/MacOS/
        fi
        cp -r frontend dist/DiskRaptor.app/Contents/Resources/
        [ -d images ] && cp -r images dist/DiskRaptor.app/Contents/Resources/
        [ -f images/icon.icns ] && cp images/icon.icns dist/DiskRaptor.app/Contents/Resources/
        if [ -f src-tauri/target/release/libdiskraptor_scanner.dylib ]; then
          cp src-tauri/target/release/libdiskraptor_scanner.dylib dist/DiskRaptor.app/Contents/MacOS/
        fi
        cat > dist/DiskRaptor.app/Contents/Info.plist << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict>
<key>CFBundleExecutable</key><string>DiskRaptor</string>
<key>CFBundleIdentifier</key><string>com.diskraptor.app</string>
<key>CFBundleName</key><string>DiskRaptor</string>
<key>CFBundleVersion</key><string>0.0.7</string>
<key>CFBundleShortVersionString</key><string>0.0.7</string>
<key>CFBundleIconFile</key><string>icon</string>
<key>CFBundlePackageType</key><string>APPL</string>
<key>LSMinimumSystemVersion</key><string>14.0</string>
<key>NSHighResolutionCapable</key><true/>
</dict></plist>
PLIST
        cd dist && zip -r ../DiskRaptor-macos.zip DiskRaptor.app && cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DiskRaptor-macos
        path: DiskRaptor-macos.zip

    - name: Publish macOS asset to shared release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: DiskRaptor ${{ github.ref_name }}
        files: DiskRaptor-macos.zip
        fail_on_unmatched_files: true

  # ─── Linux ───────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6 + deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq qt6-base-dev qt6-webengine-dev \
          cmake ninja-build pkg-config nodejs g++ zip \
          libglib2.0-dev libcairo2-dev libpango1.0-dev libatk1.0-dev \
          libgdk-pixbuf-2.0-dev libgtk-3-dev libxcb-cursor-dev \
          libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
          libicu-dev libssl-dev libsqlite3-dev

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Node deps
      run: npm ci --ignore-scripts
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    - name: Build Rust scanner
      run: cargo build --release
      working-directory: src-tauri

    - name: Build Qt app
      run: |
        cd qt-app
        rm -rf build && mkdir build && cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DQt6_DIR="/usr/lib/x86_64-linux-gnu/cmake/Qt6" \
          -DCMAKE_PREFIX_PATH="/usr/lib/x86_64-linux-gnu"
        cmake --build . --config Release
        cd ../..

    - name: Package
      run: |
        mkdir -p dist
        cp qt-app/build/DiskRaptor dist/
        cp -r frontend dist/
        mkdir -p dist/images
        cp -r images/* dist/images/ 2>/dev/null || true
        if [ -f src-tauri/target/release/libdiskraptor_scanner.so ]; then
          cp src-tauri/target/release/libdiskraptor_scanner.so dist/
        fi
        cd dist && zip -r ../DiskRaptor-linux.zip . && cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DiskRaptor-linux
        path: DiskRaptor-linux.zip

    - name: Publish Linux asset to shared release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: DiskRaptor ${{ github.ref_name }}
        files: DiskRaptor-linux.zip
        fail_on_unmatched_files: true
