name: Build and Release

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: diskraptor.exe
            asset_bin: DiskRaptor-Windows-x64.exe
            install_wix: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: diskraptor
            asset_bin: DiskRaptor-macOS-x64
            install_wix: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: diskraptor
            asset_bin: DiskRaptor-Linux-x64
            install_wix: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install npm deps
        run: npm install
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-key: "rust-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            librsvg2-dev \
            libsoup2.4-dev \
            libglib2.0-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install WiX (required for MSI on Windows)
        if: matrix.install_wix
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress --limit-output -y

      - name: Build + bundle with Tauri
        run: npx tauri build

      - name: Collect artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $dir = "src-tauri/target/release"
          # Raw binary
          if (Test-Path "$dir/${{ matrix.binary }}") {
            Copy-Item "$dir/${{ matrix.binary }}" "artifacts/${{ matrix.asset_bin }}" -Force
          }
          # Bundle artifacts (MSI)
          if (Test-Path "$dir/bundle") {
            Get-ChildItem -Recurse -File "$dir/bundle" | ForEach-Object {
              Copy-Item $_.FullName "artifacts/" -Force
            }
          }
          Get-ChildItem artifacts

      - name: Collect artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p artifacts
          RELDIR="src-tauri/target/release"
          # Raw binary
          if [ -f "$RELDIR/${{ matrix.binary }}" ]; then
            cp "$RELDIR/${{ matrix.binary }}" "artifacts/${{ matrix.asset_bin }}"
          fi
          # Bundle artifacts (DMG/AppImage)
          if [ -d "$RELDIR/bundle" ]; then
            find "$RELDIR/bundle" -type f -exec cp {} artifacts/ \;
          fi
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: artifacts/**
          retention-days: 7

  release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets
          ls -la artifacts/
          cp artifacts/* release_assets/ 2>/dev/null || true
          ls -la release_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DiskRaptor ${{ github.ref_name }}
          body: |
            ## DiskRaptor ${{ github.ref_name }}

            | Platform | Downloads |
            |----------|-----------|
            | **Windows** | `.msi` installer or `DiskRaptor-Windows-x64.exe` |
            | **macOS** | `.dmg` or `DiskRaptor-macOS-x64` binary |
            | **Linux** | `.AppImage` or `DiskRaptor-Linux-x64` binary |

            > ⚠️ macOS & Linux builds are unsigned. On macOS: right-click → Open. On Linux: `chmod +x && ./DiskRaptor-Linux-x64`.
          files: release_assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
