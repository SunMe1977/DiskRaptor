name: Build DiskRaptor CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Qt 6.10.3
        shell: pwsh
        run: |
          python -m pip install --upgrade pip aqtinstall
          aqt install-qt windows desktop 6.10.3 win64_msvc2022_64 --modules qtwebengine qtwebchannel qtpositioning -O C:\Qt
          aqt install-tool windows desktop tools_ninja -O C:\Qt
          aqt install-tool windows desktop tools_cmake -O C:\Qt

      - name: Install Node dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Setup Rust toolchain
        shell: pwsh
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Find VS installation
        id: findvs
        shell: pwsh
        run: |
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "VS not found" }
          echo "VS_PATH=$vsPath" >> $env:GITHUB_OUTPUT

      - name: Build Qt app
        shell: cmd
        run: |
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          set "PATH=C:\Qt\Tools\CMake_64\bin;C:\Qt\Tools\Ninja;%PATH%"
          set "QT_DIR=C:\Qt\6.10.3\msvc2022_64"
          set "Qt6_DIR=%QT_DIR%\lib\cmake\Qt6"
          set "CMAKE_PREFIX_PATH=%QT_DIR%"
          pushd qt-app
          if exist build rmdir /s /q build
          mkdir build
          pushd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="%Qt6_DIR%" -DCMAKE_PREFIX_PATH="%CMAKE_PREFIX_PATH%"
          if errorlevel 1 exit /b 1
          cmake --build . --config Release
          if errorlevel 1 exit /b 1
          popd
          popd
        env:
          VS_PATH: ${{ steps.findvs.outputs.VS_PATH }}

      - name: Package
        shell: cmd
        run: |
          mkdir dist
          copy qt-app\build\DiskRaptor.exe dist\
          if exist src-tauri\target\release\diskraptor_scanner.dll copy src-tauri\target\release\diskraptor_scanner.dll dist\
          xcopy /e /i /y frontend dist\frontend\ >nul
          if exist images xcopy /e /i /y images dist\images\ >nul
          xcopy /e /i /y qt-app\build\*.dll dist\ >nul
          if exist qt-app\build\platforms xcopy /e /i /y qt-app\build\platforms dist\platforms\ >nul
          if exist qt-app\build\styles xcopy /e /i /y qt-app\build\styles dist\styles\ >nul
          if exist qt-app\build\imageformats xcopy /e /i /y qt-app\build\imageformats dist\imageformats\ >nul
          if exist qt-app\build\tls xcopy /e /i /y qt-app\build\tls dist\tls\ >nul
          if exist qt-app\build\iconengines xcopy /e /i /y qt-app\build\iconengines dist\iconengines\ >nul
          if exist qt-app\build\generic xcopy /e /i /y qt-app\build\generic dist\generic\ >nul
          if exist qt-app\build\networkinformation xcopy /e /i /y qt-app\build\networkinformation dist\networkinformation\ >nul
          if exist qt-app\build\position xcopy /e /i /y qt-app\build\position dist\position\ >nul
          if exist qt-app\build\resources xcopy /e /i /y qt-app\build\resources dist\resources\ >nul
          if exist qt-app\build\translations xcopy /e /i /y qt-app\build\translations dist\translations\ >nul
          if exist qt-app\build\QtWebEngineProcess.exe copy qt-app\build\QtWebEngineProcess.exe dist\
          powershell -NoProfile -Command "Compress-Archive -Path dist\* -DestinationPath DiskRaptor-windows.zip -Force"

      - name: Create NSIS installer
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer\nsis\DiskRaptor.nsi
          Copy-Item installer\nsis\DiskRaptor_*.exe dist\

      - name: Run scan test
        shell: cmd
        run: node test_scan.mjs "%USERPROFILE%"
        timeout-minutes: 10
        continue-on-error: true
        env:
          DISKraptor_CDP_PORT: 9222

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-windows
          path: |
            DiskRaptor-windows.zip
            dist/DiskRaptor_*.exe

  macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Qt and tools
        run: |
          brew install qt@6 cmake ninja

      - name: Setup Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Build Qt app
        run: |
          export Qt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6"
          export CMAKE_PREFIX_PATH="$(brew --prefix qt@6)"
          cd qt-app
          rm -rf build
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="$Qt6_DIR" -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          cmake --build . --config Release

      - name: Package
        run: |
          mkdir -p dist
          if [ -d qt-app/build/DiskRaptor.app ]; then
            cp -R qt-app/build/DiskRaptor.app dist/
          else
            mkdir -p dist/DiskRaptor.app/Contents/MacOS
            mkdir -p dist/DiskRaptor.app/Contents/Resources
            cp qt-app/build/DiskRaptor dist/DiskRaptor.app/Contents/MacOS/
            cp -R frontend dist/DiskRaptor.app/Contents/Resources/
            [ -d images ] && cp -R images dist/DiskRaptor.app/Contents/Resources/
            [ -f images/icon.icns ] && cp images/icon.icns dist/DiskRaptor.app/Contents/Resources/
            cat > dist/DiskRaptor.app/Contents/Info.plist << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key><string>DiskRaptor</string>
    <key>CFBundleIdentifier</key><string>com.diskraptor.app</string>
    <key>CFBundleName</key><string>DiskRaptor</string>
    <key>CFBundleVersion</key><string>0.0.1</string>
    <key>CFBundleShortVersionString</key><string>0.0.1</string>
    <key>CFBundleIconFile</key><string>icon</string>
    <key>CFBundlePackageType</key><string>APPL</string>
    <key>LSMinimumSystemVersion</key><string>14.0</string>
    <key>NSHighResolutionCapable</key><true/>
</dict>
</plist>
PLIST
          fi
          # Bundle Qt frameworks
          QT_BIN="$(brew --prefix qt@6)/bin"
          if [ -f "$QT_BIN/macdeployqt" ]; then
            "$QT_BIN/macdeployqt" dist/DiskRaptor.app -verbose=1
          fi
          # Copy Rust scanner dylib
          if [ -f src-tauri/target/release/libdiskraptor_scanner.dylib ]; then
            cp src-tauri/target/release/libdiskraptor_scanner.dylib dist/DiskRaptor.app/Contents/MacOS/
          fi
          # Create DMG installer
          hdiutil create -volname DiskRaptor -srcfolder dist/DiskRaptor.app -ov -format UDZO DiskRaptor-macos.dmg
          # Create zip
          cd dist
          zip -r ../DiskRaptor-macos.zip DiskRaptor.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-macos
          path: |
            DiskRaptor-macos.zip
            DiskRaptor-macos.dmg

  linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qt6-base-dev qt6-webengine-dev \
            cmake ninja-build pkg-config g++ zip \
            libglib2.0-dev libcairo2-dev libpango1.0-dev libatk1.0-dev \
            libgdk-pixbuf-2.0-dev libgtk-3-dev libxcb-cursor-dev \
            libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev

      - name: Setup Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Build Qt app
        run: |
          cd qt-app
          rm -rf build
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="/usr/lib/x86_64-linux-gnu/cmake/Qt6" -DCMAKE_PREFIX_PATH="/usr/lib/x86_64-linux-gnu"
          cmake --build . --config Release

      - name: Package
        run: |
          mkdir -p dist
          cp qt-app/build/DiskRaptor dist/
          cp -R frontend dist/frontend
          if [ -d images ]; then cp -R images dist/images; fi
          if [ -f src-tauri/target/release/libdiskraptor_scanner.so ]; then
            cp src-tauri/target/release/libdiskraptor_scanner.so dist/
          fi
          # Copy Qt libraries
          mkdir -p dist/lib
          for lib in libQt6Core libQt6Gui libQt6Widgets libQt6WebEngineCore libQt6WebEngineWidgets libQt6WebChannel libQt6Network libQt6OpenGL libQt6Positioning libQt6PrintSupport libQt6Qml libQt6Quick libQt6Svg; do
            for f in /usr/lib/x86_64-linux-gnu/${lib}.so.*; do
              [ -f "$f" ] && cp -n "$f" dist/lib/ 2>/dev/null || true
            done
          done
          # Create launcher script
          cat > dist/DiskRaptor.sh << 'SCRIPT'
#!/bin/bash
cd "$(dirname "$0")"
export LD_LIBRARY_PATH="$PWD/lib:$LD_LIBRARY_PATH"
export QT_QPA_PLATFORM_PLUGIN_PATH="$PWD/lib"
exec ./DiskRaptor "$@"
SCRIPT
          chmod +x dist/DiskRaptor.sh
          cd dist
          zip -r ../DiskRaptor-linux.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-linux
          path: DiskRaptor-linux.zip

  release_assets:
    name: Attach Release Assets
    needs: [windows, macos, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload assets to tag release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "DiskRaptor ${GITHUB_REF_NAME}" --notes "Automated release" 2>/dev/null || true
          # Upload all artifacts recursively
          find artifacts -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.exe" \) -exec gh release upload "${GITHUB_REF_NAME}" {} --clobber \;
