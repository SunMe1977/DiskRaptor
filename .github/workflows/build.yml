name: Build & Test DiskRaptor v0.0.1

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always
  QT_VERSION: "6.10.3"

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: qtwebengine qtwebchannel
        cache: true

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Install 7-Zip
      run: choco install 7zip -y

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Playwright
      run: |
        npm init -y
        npm install playwright ws
        npx playwright install chromium

    # ── Build ──────────────────────────────────────────────
    - name: Build Rust scanner DLL
      run: |
        cd src-tauri
        cargo build --release
      shell: cmd

    - name: Build Qt app
      run: |
        cd qt-app
        if exist build rmdir /s /q build
        mkdir build
        cd build
        cmake .. -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="%Qt6_DIR%" -DCMAKE_PREFIX_PATH="%Qt6_DIR%"
        cmake --build . --config Release
      shell: cmd

    - name: Stage dist
      run: |
        mkdir dist
        xcopy /e /i /y qt-app\build\DiskRaptor.exe dist\
        xcopy /e /i /y qt-app\build\DiskRaptorLauncher.exe dist\
        xcopy /e /i /y qt-app\build\diskraptor_scanner.dll dist\
        xcopy /e /i /y qt-app\build\*.dll dist\
        xcopy /e /i /y qt-app\build\QtWebEngineProcess.exe dist\
        for %%d in (platforms styles imageformats tls iconengines generic networkinformation position resources translations) do (
          if exist qt-app\build\%%d xcopy /e /i /y qt-app\build\%%d dist\%%d\
        )
        xcopy /e /i /y frontend dist\frontend\
      shell: cmd

    # ── Test ───────────────────────────────────────────────
    - name: Run UI test (small dir)
      run: node test_scan.mjs "C:\dev\DiskRaptor"
      shell: cmd
      timeout-minutes: 2
      env:
        DISKraptor_CDP_PORT: 9222

    - name: Run stress test (100K)
      run: node stress_test.mjs 100000
      shell: cmd
      timeout-minutes: 2

    # ── Package ────────────────────────────────────────────
    - name: Package bootstrap
      run: |
        mkdir artifacts
        "%ProgramFiles%\7-Zip\7z.exe" a -tzip artifacts\DiskRaptor_Bootstrap_v0.0.1.zip ^
          dist\DiskRaptorLauncher.exe ^
          dist\DiskRaptor.exe ^
          dist\diskraptor_scanner.dll ^
          dist\frontend
      shell: cmd

    - name: Package Qt runtime
      run: |
        cd dist
        "%ProgramFiles%\7-Zip\7z.exe" a -tzip -mx=5 ..\artifacts\qtwebengine_runtime.zip ^
          *.dll QtWebEngineProcess.exe ^
          platforms imageformats styles tls iconengines generic networkinformation position resources translations
      shell: cmd

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: diskraptor-build
        path: artifacts/

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/DiskRaptor_Bootstrap_v0.0.1.zip
          artifacts/qtwebengine_runtime.zip
