name: Build & Test DiskRaptor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.3'
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: qtwebengine qtwebchannel
        cache: true

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup MSVC dev prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci --ignore-scripts
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    - name: Install Playwright Chromium
      run: npx playwright install chromium

    # ── Build ──────────────────────────────────────────────
    - name: Build Rust scanner DLL
      run: cargo build --release
      working-directory: src-tauri

    - name: Build Qt app
      run: |
        echo "Qt6_DIR=$Env:Qt6_DIR"
        cd qt-app
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        New-Item -ItemType Directory -Force -Path build | Out-Null
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="$Env:Qt6_DIR" -DCMAKE_PREFIX_PATH="$Env:Qt6_DIR"
        cmake --build . --config Release -- /verbosity:minimal
      shell: pwsh

    - name: Stage dist
      run: |
        $SRC="qt-app\build\Release"
        New-Item -ItemType Directory -Force -Path dist | Out-Null
        Copy-Item "$SRC\DiskRaptor.exe" dist\
        Copy-Item "$SRC\diskraptor_scanner.dll" dist\
        Copy-Item "$SRC\QtWebEngineProcess.exe" dist\
        Copy-Item "$SRC\*.dll" dist\
        if (Test-Path "$SRC\platforms") { Copy-Item -Recurse "$SRC\platforms" dist\ }
        if (Test-Path "$SRC\styles") { Copy-Item -Recurse "$SRC\styles" dist\ }
        if (Test-Path "$SRC\imageformats") { Copy-Item -Recurse "$SRC\imageformats" dist\ }
        if (Test-Path "$SRC\tls") { Copy-Item -Recurse "$SRC\tls" dist\ }
        if (Test-Path "$SRC\iconengines") { Copy-Item -Recurse "$SRC\iconengines" dist\ }
        if (Test-Path "$SRC\networkinformation") { Copy-Item -Recurse "$SRC\networkinformation" dist\ }
        if (Test-Path "$SRC\position") { Copy-Item -Recurse "$SRC\position" dist\ }
        if (Test-Path "$SRC\generic") { Copy-Item -Recurse "$SRC\generic" dist\ }
        if (Test-Path "$SRC\resources") { Copy-Item -Recurse "$SRC\resources" dist\ }
        if (Test-Path "$SRC\translations") { Copy-Item -Recurse "$SRC\translations" dist\ }
        Copy-Item -Recurse frontend dist\frontend\
        if (Test-Path images) { Copy-Item -Recurse images dist\images\ }
      shell: pwsh

    # ── Test ───────────────────────────────────────────────
    - name: Run UI test
      run: node test_scan.mjs "$Env:USERPROFILE"
      shell: pwsh
      timeout-minutes: 5
      env:
        DISKraptor_CDP_PORT: 9222

    # ── Package ────────────────────────────────────────────
    - name: Package release zip
      run: |
        New-Item -ItemType Directory -Force -Path artifacts | Out-Null
        & "C:\Program Files\7-Zip\7z.exe" a -tzip artifacts\DiskRaptor_v0.0.1.zip .\dist\*
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: diskraptor-build
        path: artifacts/

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/DiskRaptor_v0.0.1.zip
