name: Build and Release

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════
  # 1. QT 6 BUILD (Windows — Qt + Chromium MSI)
  # ════════════════════════════════════════════════════
  build-qt:
    if: github.ref_type == 'tag'
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtwebengine qtwebchannel qtwebsockets'
          cache: 'true'
          install-deps: 'true'

      - name: Install WiX
        run: choco install wixtoolset --no-progress -y
        shell: pwsh

      - name: Build Qt app + MSI
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          cd qt-app
          if exist build rmdir /s /q build
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
          cmake --build . --config Release
          if not exist DiskRaptor.exe exit /b 1
          mkdir install\bin
          copy DiskRaptor.exe install\bin\
          windeployqt --release --no-translations --dir "%cd%\install\bin" "%cd%\install\bin\DiskRaptor.exe"
          cpack -G WIX -C Release -D CPACK_PACKAGE_FILE_NAME="DiskRaptor_0.2.7_x64_Qt"

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-qt
          path: qt-app/build/DiskRaptor_*.msi
          if-no-files-found: error

  # ════════════════════════════════════════════════════
  # 2. GITHUB RELEASE
  # ════════════════════════════════════════════════════
  release:
    if: github.ref_type == 'tag'
    needs: build-qt
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-windows-qt
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          cp -r artifacts/* release_assets/ 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DiskRaptor ${{ github.ref_name }}
          body: |
            ## DiskRaptor ${{ github.ref_name }}

            **Qt 6 + Chromium Edition** — no WebView2, no GTK, no WebKitGTK needed.

            | Platform | Download |
            |----------|----------|
            | **Windows** | `DiskRaptor_*_Qt.msi` |
          files: release_assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
