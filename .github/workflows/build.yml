name: Build DiskRaptor CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Setup Rust toolchain
        shell: pwsh
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          rustup target add x86_64-pc-windows-msvc

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Build Qt app
        shell: cmd
        run: |
          pushd qt-app
          if exist build rmdir /s /q build
          mkdir build
          pushd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          popd
          popd

      - name: Package
        shell: cmd
        run: |
          if exist qt-app\build\Release\DiskRaptor.exe ( set SRC=qt-app\build\Release ) else ( set SRC=qt-app\build )
          mkdir dist
          copy %SRC%\DiskRaptor.exe dist\
          if exist src-tauri\target\release\diskraptor_scanner.dll copy src-tauri\target\release\diskraptor_scanner.dll dist\
          xcopy /e /i /y frontend dist\frontend\ >nul
          if exist images xcopy /e /i /y images dist\images\ >nul
          powershell -NoProfile -Command "Compress-Archive -Path dist\* -DestinationPath DiskRaptor-windows.zip -Force"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-windows
          path: DiskRaptor-windows.zip

  macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Install Qt and tools
        run: |
          brew install qt@6 cmake ninja

      - name: Setup Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Build Qt app
        run: |
          export Qt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6"
          export CMAKE_PREFIX_PATH="$(brew --prefix qt@6)"
          cd qt-app
          rm -rf build
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="$Qt6_DIR" -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          cmake --build . --config Release

      - name: Package
        run: |
          mkdir -p dist
          if [ -d qt-app/build/DiskRaptor.app ]; then
            cp -R qt-app/build/DiskRaptor.app dist/
          else
            cp qt-app/build/DiskRaptor dist/
          fi
          cp -R frontend dist/frontend
          if [ -d images ]; then cp -R images dist/images; fi
          cd dist
          zip -r ../DiskRaptor-macos.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-macos
          path: DiskRaptor-macos.zip

  linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qt6-base-dev qt6-webengine-dev \
            cmake ninja-build pkg-config g++ zip \
            libglib2.0-dev libcairo2-dev libpango1.0-dev libatk1.0-dev \
            libgdk-pixbuf-2.0-dev libgtk-3-dev libxcb-cursor-dev \
            libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libicu-dev libssl-dev libsqlite3-dev

      - name: Setup Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Build Rust scanner
        run: cargo build --release
        working-directory: src-tauri

      - name: Build Qt app
        run: |
          cd qt-app
          rm -rf build
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DQt6_DIR="/usr/lib/x86_64-linux-gnu/cmake/Qt6" -DCMAKE_PREFIX_PATH="/usr/lib/x86_64-linux-gnu"
          cmake --build . --config Release

      - name: Package
        run: |
          mkdir -p dist
          cp qt-app/build/DiskRaptor dist/
          cp -R frontend dist/frontend
          if [ -d images ]; then cp -R images dist/images; fi
          if [ -f src-tauri/target/release/libdiskraptor_scanner.so ]; then cp src-tauri/target/release/libdiskraptor_scanner.so dist/; fi
          cd dist
          zip -r ../DiskRaptor-linux.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskRaptor-linux
          path: DiskRaptor-linux.zip

  release_assets:
    name: Attach Release Assets
    needs: [windows, macos, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload assets to tag release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "DiskRaptor ${GITHUB_REF_NAME}" --notes "Automated release" 2>/dev/null || true
          gh release upload "${GITHUB_REF_NAME}" artifacts/DiskRaptor-windows/DiskRaptor-windows.zip --clobber
          gh release upload "${GITHUB_REF_NAME}" artifacts/DiskRaptor-macos/DiskRaptor-macos.zip --clobber
          gh release upload "${GITHUB_REF_NAME}" artifacts/DiskRaptor-linux/DiskRaptor-linux.zip --clobber
