<!DOCTYPE html>

<head>

    #test-output {
      position: fixed; top: 0; right: 0; width: 500px; height: 100vh;
      overflow-y: auto; background: #0d1117; border-left: 2px solid #30363d;

    #test-output .fail { color: #f85149; }

    // ═══════════════════════════════════════════════════════════════════════
    // Test framework
    // ═══════════════════════════════════════════════════════════════════════
    const pass = [];
    const fail = [];

    function assert(condition, msg) {
      if (condition) { pass.push(msg); return true; }
      fail.push(msg);
      return false;
    }

    function assertEq(a, b, msg) {
      if (a === b) { pass.push(msg); return true; }
      fail.push(msg + ' — expected ' + JSON.stringify(b) + ', got ' + JSON.stringify(a));
      return false;
    }

    function assertNe(a, b, msg) {
      if (a !== b) { pass.push(msg); return true; }
      fail.push(msg + ' — both were ' + JSON.stringify(a));
      return false;
    }

    function assertMatch(str, pattern, msg) {
      if (pattern.test(str)) { pass.push(msg); return true; }
      fail.push(msg + ' — "' + str + '" does not match ' + pattern);
      return false;
    }

    function sleepMs(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

    function logResult() {
      var out = document.getElementById('test-output');
      var cats = {};
      pass.forEach(function(m) {
        var cat = m.charAt(0);
        if (!cats[cat]) cats[cat] = { p: 0, f: 0 };
        cats[cat].p++;
      });
      fail.forEach(function(m) {
        var cat = m.charAt(0);
        if (!cats[cat]) cats[cat] = { p: 0, f: 0 };
        cats[cat].f++;
      });

      var catNames = {
        A: 'A: Toolbar & Header', B: 'B: Button Click Actions', C: 'C: Tree View',
        D: 'D: Context Menus', E: 'E: Stats Panel', F: 'F: Selection Panel',
        G: 'G: Top 50 Files', H: 'H: Diagram', I: 'I: Progress Overlay',
        J: 'J: Language Switcher', K: 'K: Menu Events', L: 'L: Duplicate Scanner',
        M: 'M: Edge Cases'
      };

      var html = '<h2>🧪 DiskRaptor UI Test Matrix (' + (pass.length + fail.length) + ' total)</h2>';
      html += '<table style="width:100%;font-size:11px;margin-bottom:8px;border-collapse:collapse">';
      html += '<tr style="background:#161b22"><th>Category</th><th>Pass</th><th>Fail</th><th>%</th></tr>';
      ['A','B','C','D','E','F','G','H','I','J','K','L','M'].forEach(function(c) {
        var d = cats[c] || { p: 0, f: 0 };
        var total = d.p + d.f;
        var pct = total > 0 ? (d.p / total * 100).toFixed(0) : '—';
        var color = d.f > 0 ? '#f85149' : '#3fb950';
        html += '<tr style="border-bottom:1px solid #21262d"><td style="color:' + color + '">' + (catNames[c] || c) + '</td><td>' + d.p + '</td><td>' + d.f + '</td><td>' + pct + '%</td></tr>';
      });
      var totalPct = (pass.length + fail.length) > 0 ? (pass.length / (pass.length + fail.length) * 100).toFixed(0) : '—';
      html += '<tr style="font-weight:bold;background:#161b22"><td>TOTAL</td><td>' + pass.length + '</td><td>' + fail.length + '</td><td>' + totalPct + '%</td></tr>';
      html += '</table>';
      html += '<hr/>';
      pass.forEach(function(m) { html += '<div class="test-row"><span class="pass">✔</span> <span class="num">' + m + '</span></div>'; });
      fail.forEach(function(m) { html += '<div class="test-row"><span class="fail">✘</span> <span class="num">' + m + '</span></div>'; });
      html += '<hr/><div>Passed: ' + pass.length + ' &nbsp;|&nbsp; Failed: ' + fail.length + ' &nbsp;|&nbsp; Total: ' + (pass.length + fail.length) + '</div>';
      out.innerHTML = html;
    }

              },
            };

          case 'get_chunk': {
            var ci = args && args.chunkIndex || 0;
            var nodes = [];
            var base = ci * 10000;
            var count = ci === 0 ? 5 : 3;
            for (var i = 0; i < count; i++) {
              var idx = base + i;

                name: idx === 0 ? '(root)' : 'item_' + idx,

                file_count: isDir ? (10 - i) : 1,
                node_type: isDir ? 'Directory' : 'File',
                parent: idx === 0 ? 4294967295 : 0,
                first_child: 4294967295,
                next_sibling: i < count - 1 ? idx + 1 : 4294967295,
                depth: idx === 0 ? 0 : 1,
                chunk_id: ci,
              });
            }
            return { chunk_id: ci, total_chunks: 2, total_nodes: 15000, nodes: nodes };
          }

          case 'get_children': {
            var children = [
              { name: 'child_A', size: 500000, file_count: 5, node_type: 'Directory', parent: args && args.nodeIndex || 0, chunk_id: 1 },
              { name: 'child_B', size: 250000, file_count: 3, node_type: 'Directory', parent: args && args.nodeIndex || 0, chunk_id: 1 },
              { name: 'file_1.txt', size: 1024, file_count: 1, node_type: 'File', parent: args && args.nodeIndex || 0, chunk_id: 1 },
            ];

          }

          case 'get_stats':
            return { total_files: 1200, total_dirs: 300, total_size: 5368709120, scan_time_ms: 423, top_files: [], file_type_breakdown: [] };

          case 'release_scan':
            return null;

          case 'open_explorer':
          case 'open_properties':
          case 'open_terminal':
          case 'delete_path':

          case 'list_drives':

          case 'get_icon':
            return 'iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAYdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAASklEQVQ4T2NkYPj/n4EBBJgYKAQMowYwjmY6jGY6jGY6jGY6jGY6jGY6jGY6jGY6jEIAADDxE2AWhLDTAAAAASUVORK5CYII=';

          case 'check_for_updates':
            return 'v0.2.3';

          default:
            throw new Error('Unknown mock command: ' + cmd);
        }

        open: async function (opts) {
          mockInvokeLog.push({ cmd: 'dialog.open()', opts: opts ? JSON.parse(JSON.stringify(opts)) : null });

      event: {
        listen: function (eventName, callback) {
          if (!window._tauriEventListeners) window._tauriEventListeners = {};
          if (!window._tauriEventListeners[eventName]) window._tauriEventListeners[eventName] = [];

        emit: function (eventName, payload) {
          if (window._tauriEventListeners && window._tauriEventListeners[eventName]) {
            window._tauriEventListeners[eventName].forEach(function (cb) {
              if (typeof cb === 'function') {
                cb({ payload: payload, event: eventName, id: Date.now() });
              }
            });
          }
        },
      },
    };
