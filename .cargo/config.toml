# DiskRaptor — Optimised CI builds

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=generic"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=generic"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=generic"]

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
